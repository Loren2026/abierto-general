<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<meta name="theme-color" content="#101D2E">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>App análisis Loren</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap');
:root{
  --bg:#e8eff6;--white:#ffffff;--card:#ffffff;--border:#c5d5e4;--border2:#9bb3c9;
  --ink:#0a1628;--ink2:#1a2940;--ink3:#3d5068;--ink4:#7a8fa3;--blue:#142e4c;
  --acc:#d4621a;--acc2:#f08c38;--green:#0d9448;--green-bg:#d1fae5;--green-light:rgba(13,148,72,.12);
  --red:#e02424;--red-bg:#fde8e8;--red-light:rgba(224,36,36,.1);
  --yellow:#b45309;--yellow-bg:#fef3c7;
  --grad-hero:linear-gradient(135deg,#142e4c 0%,#1e5a8a 60%,#2874a6 100%);
  --grad-green:linear-gradient(135deg,#0d9448,#10b860);
  --grad-red:linear-gradient(135deg,#e02424,#f56565);
  --sans:'DM Sans',system-ui,sans-serif;--mono:'DM Mono','Courier New',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);min-height:100vh;-webkit-font-smoothing:antialiased}

/* ══ HEADER + NAV ══ */
.top-bar{position:sticky;top:0;z-index:100;background:var(--white);border-bottom:2px solid var(--border);box-shadow:0 2px 12px rgba(0,0,0,.08)}
.hdr{padding:12px 16px;text-align:center}
.hdr-title{font-size:22px;font-weight:900;color:var(--blue)}.hdr-title span{color:var(--acc)}
.hdr-sub{font-size:12px;color:var(--ink3);margin-top:1px}
.tabs{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;border-top:1px solid var(--border);padding:0 8px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:12px 18px;border:none;background:none;font-family:var(--sans);font-size:14px;font-weight:800;color:var(--ink4);cursor:pointer;position:relative;white-space:nowrap;transition:color .15s}
.tab.on{color:var(--acc)}.tab.on::after{content:'';position:absolute;bottom:0;left:10px;right:10px;height:3px;background:var(--acc);border-radius:3px 3px 0 0}
.tab .tcnt{font-family:var(--mono);font-size:12px;font-weight:800;background:var(--border);padding:2px 8px;border-radius:10px;margin-left:5px;vertical-align:middle;color:var(--ink2)}
.tab.on .tcnt{background:rgba(212,98,26,.18);color:var(--acc)}

/* ══ VIEW / CARD ══ */
.view{display:none;padding:16px 14px;max-width:600px;margin:0 auto}.view.on{display:block}
.card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:0 3px 12px rgba(0,0,0,.06)}
.card-t{font-size:13px;font-weight:900;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:14px}

/* ══ BIG NUMBER ══ */
.big{font-family:var(--mono);font-weight:500;letter-spacing:-.02em;line-height:1}
.big-l{font-size:15px;font-weight:800;color:var(--ink3);margin-bottom:6px}
.big-s{font-size:14px;color:var(--ink3);margin-top:6px;font-weight:600}
.up{color:var(--green);font-weight:700}.dn{color:var(--red);font-weight:700}

/* ══ HERO CARD ══ */
.hero-card{background:var(--grad-hero);border:none;border-radius:20px;padding:28px 20px;text-align:center;color:#fff;box-shadow:0 8px 30px rgba(20,46,76,.3);margin-bottom:14px;position:relative;overflow:hidden}
.hero-card::before{content:'';position:absolute;top:-40%;right:-20%;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.04)}
.hero-card::after{content:'';position:absolute;bottom:-30%;left:-15%;width:160px;height:160px;border-radius:50%;background:rgba(255,255,255,.03)}
.hero-card .big-l{color:rgba(255,255,255,.75);font-weight:700}
.hero-card .big{color:#fff;font-size:44px;text-shadow:0 2px 8px rgba(0,0,0,.2)}
.hero-card .big-s{color:rgba(255,255,255,.6)}
.hero-card .hero-sub{display:flex;align-items:center;justify-content:center;gap:10px;margin-top:12px;flex-wrap:wrap}
.hero-card .hero-pnl{font-family:var(--mono);font-size:18px;font-weight:700;color:rgba(255,255,255,.9)}
.hero-card .hero-badge{display:inline-block;padding:4px 14px;border-radius:20px;font-family:var(--mono);font-size:15px;font-weight:700}
.hero-badge.up{background:rgba(13,148,72,.3);color:#6ee7a0}.hero-badge.dn{background:rgba(224,36,36,.3);color:#fca5a5}
.hero-card .hero-detail{font-size:13px;color:rgba(255,255,255,.5);margin-top:8px;font-weight:600}

/* ══ STAT ══ */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat{text-align:center;min-height:106px;padding:16px 10px;background:var(--card);border:1.5px solid var(--border);border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.05);transition:transform .15s;display:flex;flex-direction:column;justify-content:center}
.stat:active{transform:scale(.97)}
.stat-v{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--ink);margin-bottom:5px}
.stat-l{font-size:10.5px;font-weight:900;color:var(--ink4);text-transform:uppercase;letter-spacing:.05em;line-height:1.15}
.stat-sub{font-size:10px;font-weight:700;color:var(--ink4);margin-top:5px;line-height:1.2}
.stat.glow-up{background:var(--green-light);border-color:rgba(13,148,72,.2)}.stat.glow-up .stat-v{color:var(--green)}
.stat.glow-dn{background:var(--red-light);border-color:rgba(224,36,36,.2)}.stat.glow-dn .stat-v{color:var(--red)}

/* ══ STOCK ITEM ══ */
.si{padding:16px 0;border-bottom:1.5px solid var(--border);cursor:pointer;transition:background .15s}.si:last-child{border-bottom:none}.si:active{opacity:.7}
.si-row{display:flex;align-items:center}.si-left{flex:1;min-width:0}
.si-tk{font-family:var(--mono);font-size:22px;font-weight:700;color:var(--ink)}
.si-nm{font-size:13px;color:var(--ink3);margin-top:2px;font-weight:600}
.si-right{text-align:right;flex-shrink:0;margin-left:10px}
.si-price{font-family:var(--mono);font-size:20px;font-weight:700;color:var(--ink)}
.si-pnl{font-family:var(--mono);font-size:15px;font-weight:700;margin-top:2px}
.si-arrow{color:var(--ink4);font-size:22px;margin-left:8px}
.badge{display:inline-block;font-size:11px;font-weight:900;padding:3px 10px;border-radius:8px}
.badge-buy{background:var(--green-bg);color:var(--green)}.badge-hold{background:var(--yellow-bg);color:var(--yellow)}
.badge-sell{background:var(--red-bg);color:var(--red)}.badge-na{background:#e8edf2;color:var(--ink4)}

/* ══ ACTIONS ══ */
.act-row{display:flex;gap:8px;margin-top:14px;padding-top:14px;border-top:1.5px solid var(--border)}
.act-btn{flex:1;padding:12px;border-radius:12px;font-family:var(--sans);font-size:14px;font-weight:700;cursor:pointer;text-align:center;border:1.5px solid var(--border);background:var(--white);color:var(--ink3)}
.act-btn:active{opacity:.7}.act-btn.grn{color:var(--green);border-color:var(--green-bg);background:var(--green-bg)}
.act-btn.rd{color:var(--red);border-color:var(--red-bg);background:var(--red-bg);flex:0;padding:12px 18px}

/* ══ DETAIL ══ */
.det-back{display:inline-flex;align-items:center;gap:4px;font-size:16px;font-weight:800;color:var(--acc);background:none;border:none;cursor:pointer;padding:8px 0;margin-bottom:10px}
.det-tk{font-family:var(--mono);font-size:38px;font-weight:700;color:var(--blue)}
.det-nm{font-size:16px;color:var(--ink3);margin-top:2px;font-weight:700}
.det-tags{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
.det-tag{font-size:12px;font-weight:800;padding:5px 12px;border-radius:10px;background:var(--white);color:var(--ink3);border:1.5px solid var(--border)}
.det-tag.acc{border-color:var(--acc);color:var(--acc);background:rgba(196,90,28,.05)}

/* ══ DETAIL TABS ══ */
.dtabs{display:flex;gap:6px;margin:18px 0 14px;flex-wrap:wrap}
.dtab{padding:10px 18px;border-radius:12px;font-family:var(--sans);font-size:14px;font-weight:800;color:var(--ink4);background:var(--white);border:1.5px solid var(--border);cursor:pointer;transition:all .15s}
@media(max-width:559px){.dtabs{display:grid;grid-template-columns:repeat(4,1fr);gap:5px;flex-wrap:nowrap;margin:12px 0 10px}.dtab{padding:8px 4px;border-radius:10px;font-size:12px;line-height:1;white-space:nowrap;text-align:center}}
.dtab.on{color:var(--blue);border-color:var(--acc);background:rgba(196,90,28,.06)}
.dpanel{display:none;animation:dfade .2s ease}.dpanel.on{display:block}
.val-sticky-actions{position:sticky;top:8px;z-index:30;display:grid;grid-template-columns:1fr;gap:8px;margin:12px 0 14px;padding:10px;background:rgba(246,242,234,.94);backdrop-filter:blur(8px);border:1.5px solid var(--border);border-radius:16px;box-shadow:0 8px 24px rgba(31,45,61,.10)}
@media(min-width:560px){.val-sticky-actions{grid-template-columns:1fr 1fr}}
.recalc-btn,.idc-upload-btn{width:100%;min-height:106px;padding:16px 10px;border-radius:16px;font-family:var(--sans);font-size:14px;font-weight:900;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--blue);box-shadow:0 2px 8px rgba(0,0,0,.05)}
.recalc-btn.pending{border-color:var(--acc);background:rgba(196,90,28,.12);color:var(--acc);box-shadow:0 0 0 3px rgba(196,90,28,.10)}
.compact-label{display:none}
@media(max-width:559px){.val-sticky-actions{grid-template-columns:1fr 1fr 1fr;gap:6px;margin:8px 0 10px;padding:6px;border-radius:12px;align-items:center;min-height:44px}.val-sticky-actions .recalc-btn,.val-sticky-actions .idc-upload-btn,.val-sticky-actions .act-btn{min-height:34px;height:34px;padding:4px 5px;border-radius:10px;font-size:11px;line-height:1.05;box-shadow:none}.val-sticky-actions .act-btn{grid-column:auto!important;width:100%}.val-sticky-actions .wide-label{display:none}.val-sticky-actions .compact-label{display:inline}}
@keyframes dfade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.mrow{display:flex;justify-content:space-between;align-items:center;padding:13px 0;border-bottom:1px solid var(--border)}.mrow:last-child{border-bottom:none}
.mrow-l{font-size:14px;font-weight:700;color:var(--ink2)}.mrow-v{font-family:var(--mono);font-size:14px;font-weight:700;text-align:right}
.dtbl{width:100%;border-collapse:collapse;font-size:13px}
.dtbl th{padding:12px 8px;text-align:right;font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--ink3);border-bottom:2px solid var(--border);white-space:nowrap;background:var(--white)}.dtbl th:first-child{text-align:left}
.dtbl td{padding:12px 8px;text-align:right;font-family:var(--mono);font-size:13px;font-weight:700;border-top:1px solid var(--border);white-space:nowrap}.dtbl td:first-child{text-align:left;font-family:var(--sans);font-weight:800;color:var(--ink)}
.dtbl tr.trow{border-top:2.5px solid var(--blue)}.dtbl tr.trow td{font-weight:700}
.price-cmp{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.price-cmp-box{text-align:center;padding:14px 10px;background:var(--card);border:1.5px solid var(--border);border-radius:14px}
.price-cmp-box .pcl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--ink4);margin-bottom:5px}
.price-cmp-box .pcv{font-family:var(--mono);font-size:22px;font-weight:700}

/* ══ FX BAR ══ */
.fx-bar{display:flex;align-items:center;gap:14px;padding:12px 18px;background:var(--card);border:1.5px solid var(--border);border-radius:14px;margin-bottom:14px;font-size:13px;color:var(--ink3);flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.04)}
.fx-bar .fx-icon{font-size:18px}.fx-bar .fx-pair{font-weight:700;color:var(--ink3)}.fx-bar .fx-val{font-family:var(--mono);font-weight:800;color:var(--blue);font-size:15px}

/* ══ PERFORMANCE BARS ══ */
.perf-card{margin-bottom:14px}
.perf-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--border)}.perf-row:last-child{border-bottom:none}
.perf-tk{font-family:var(--mono);font-size:15px;font-weight:700;min-width:50px}.perf-tk.up{color:var(--green)}.perf-tk.dn{color:var(--red)}
.perf-bar-wrap{flex:1;height:14px;background:#dce4ed;border-radius:7px;position:relative;overflow:hidden}
.perf-bar{height:100%;border-radius:7px;min-width:4px;animation:barGrow .6s ease-out both}.perf-bar.up{background:var(--grad-green)}.perf-bar.dn{background:var(--grad-red)}
@keyframes barGrow{from{width:0!important}to{}}
.perf-pct{font-family:var(--mono);font-size:14px;font-weight:800;min-width:66px;text-align:right}

/* ══ MODAL ══ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:none;align-items:flex-end;justify-content:center}.overlay.open{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:24px 20px 32px;width:100%;max-width:440px}
.modal h3{font-size:20px;font-weight:900;color:var(--blue);margin-bottom:18px}
.fld{margin-bottom:14px}.fld label{display:block;font-size:12px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin-bottom:6px}
.fld input{width:100%;padding:14px;background:var(--bg);border:1.5px solid var(--border);color:var(--ink);font-family:var(--sans);font-size:16px;font-weight:500;border-radius:12px}.fld input:focus{outline:none;border-color:var(--acc)}
.mo-btns{display:flex;gap:10px;margin-top:20px}
.mo-btn{flex:1;padding:16px;border:none;border-radius:14px;font-family:var(--sans);font-size:16px;font-weight:800;cursor:pointer;text-align:center}
.mo-btn.cancel{background:var(--bg);color:var(--ink3)}.mo-btn.ok{background:var(--acc);color:#fff}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(50px);background:var(--ink);color:#fff;padding:14px 28px;border-radius:14px;font-size:15px;font-weight:700;box-shadow:0 8px 24px rgba(0,0,0,.25);transition:transform .3s ease,opacity .3s ease;z-index:600;opacity:0;visibility:hidden;cursor:pointer}

/* ══ MODAL CARTERA (entrada/salida) ══ */
.overlay2{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:510;display:none;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}.overlay2.open{display:flex}
.modal2{background:var(--white);border-radius:22px 22px 0 0;padding:24px 20px 34px;width:100%;max-width:440px;max-height:85vh;overflow-y:auto;animation:modalUp .25s ease-out}
@keyframes modalUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal2 h3{font-size:20px;font-weight:900;color:var(--blue);margin-bottom:6px}
.modal2 .m2-sub{font-size:13px;color:var(--ink3);font-weight:600;margin-bottom:18px}
.modal2 .m2-tk{font-family:var(--mono);color:var(--acc);font-weight:800}
.m2-calc{display:flex;gap:10px;margin-top:4px;padding:10px 14px;background:var(--bg);border-radius:12px;align-items:center}
.m2-calc-lbl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--ink4)}
.m2-calc-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--blue)}
.m2-divider{height:1.5px;background:var(--border);margin:18px 0}
.m2-opts{display:flex;flex-direction:column;gap:10px;margin-bottom:6px}
.m2-opt{padding:16px 18px;border-radius:14px;border:1.5px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s}
.m2-opt:active{transform:scale(.97)}
.m2-opt .m2-opt-icon{font-size:22px;flex-shrink:0}
.m2-opt .m2-opt-txt{flex:1}
.m2-opt .m2-opt-title{font-size:15px;font-weight:800;color:var(--ink)}
.m2-opt .m2-opt-desc{font-size:12px;color:var(--ink4);margin-top:2px}
.m2-opt.sell{border-color:rgba(224,36,36,.25);background:var(--red-light)}.m2-opt.sell .m2-opt-title{color:var(--red)}
.m2-opt.move{border-color:rgba(180,83,9,.25);background:var(--yellow-bg)}.m2-opt.move .m2-opt-title{color:var(--yellow)}
.m2-opt.del{border-color:rgba(224,36,36,.15);background:var(--red-bg)}.m2-opt.del .m2-opt-title{color:var(--red)}
.m2-opt.buy{border-color:rgba(13,148,72,.25);background:var(--green-light)}.m2-opt.buy .m2-opt-title{color:var(--green)}

/* ══ BROKER DOCS ══ */
.broker-card{background:var(--card);border:1.5px solid var(--border);border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:0 3px 12px rgba(0,0,0,.06)}
.broker-status{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:12px;margin-top:12px;font-size:13px;font-weight:700}
.broker-status.ok{background:var(--green-light);color:var(--green);border:1px solid rgba(13,148,72,.2)}
.broker-status.empty{background:var(--bg);color:var(--ink4);border:1px solid var(--border)}
.broker-tariff{margin-top:12px;font-size:12px}
.broker-tariff .bt-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.broker-tariff .bt-row:last-child{border-bottom:none}
.broker-tariff .bt-label{color:var(--ink3);font-weight:700}
.broker-tariff .bt-value{font-family:var(--mono);font-weight:700;color:var(--ink)}
.upload-zone{width:100%;padding:18px;border:2px dashed var(--border2);border-radius:14px;background:#eef3f8;font-family:var(--sans);font-size:14px;font-weight:700;color:var(--ink3);cursor:pointer;text-align:center;transition:all .15s;position:relative}
.upload-zone:active{transform:scale(.97);background:#dde8f2}
.upload-zone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-zone.processing{border-color:var(--acc);background:#fff8ee;color:var(--acc)}
.comm-attach{margin-top:6px}
.comm-attach-btn{display:flex;align-items:center;gap:8px;padding:10px 14px;border:1.5px dashed var(--border2);border-radius:10px;background:#f8fafc;cursor:pointer;font-size:12px;font-weight:700;color:var(--ink3);transition:all .15s;position:relative}
.comm-attach-btn:active{background:#eef3f8}
.comm-attach-btn input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer}
.comm-attach-btn.done{border-color:var(--green);background:var(--green-light);color:var(--green)}
.comm-attach-btn.reading{border-color:var(--acc);background:#fff8ee;color:var(--acc);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}

/* ══ VALORACIÓN IDC — TABLAS ══ */
.val-section{margin-bottom:18px}
.val-section-t{font-size:14px;font-weight:900;color:var(--blue);margin-bottom:10px;padding:10px 14px;background:var(--blue);color:#fff;border-radius:12px;letter-spacing:.03em}
.val-scroll{overflow-x:auto;margin:0 -20px;padding:0 20px;-webkit-overflow-scrolling:touch}
.vt{width:100%;border-collapse:collapse;font-size:12px;min-width:600px}
.vt th{padding:7px 6px;text-align:right;font-size:10px;font-weight:800;color:#fff;background:var(--blue);white-space:nowrap;letter-spacing:.04em;position:sticky;top:0}
.vt th:first-child{text-align:left;min-width:90px;border-radius:6px 0 0 0}.vt th:last-child{border-radius:0 6px 0 0}
.vt th.est{background:#1e5a8a}.vt th.med{background:#2e7d32}
.vt td{padding:7px 6px;text-align:right;font-family:var(--mono);font-size:12px;font-weight:600;color:var(--ink2);border-bottom:1px solid #e8edf2;white-space:nowrap}
.vt td:first-child{text-align:left;font-family:var(--sans);font-size:12px;font-weight:800;color:var(--ink)}
.vt tr.hi td{background:#eef6ff}.vt tr.hi td:first-child{background:#eef6ff}
.vt tr.sep td{border-top:2.5px solid var(--blue)}
.vt td.est-c{background:#f0f8ff}.vt td.med-c{background:#f0f7ee}
.vt td.neg{color:var(--red)}.vt td.pos{color:var(--green)}

/* ══ INPUTS IDC — 3 columnas ══ */
.idc-tbl{width:100%;border-collapse:collapse;min-width:400px;font-size:12px}
.idc-tbl th{padding:8px 6px;text-align:center;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.06em;color:#fff;white-space:nowrap}
.idc-tbl th:nth-child(1){background:var(--blue);text-align:left;min-width:150px}
.idc-tbl th:nth-child(2){background:var(--acc);width:27%}
.idc-tbl th:nth-child(3){background:#b45309;width:27%}
.idc-tbl th:nth-child(4){background:#2e7d32;width:27%}
.idc-tbl td{padding:8px 6px;border-bottom:1px solid var(--border);vertical-align:middle;font-size:12px}
.idc-tbl td:first-child{font-weight:800;color:var(--ink)}
.idc-tbl .c-app{font-family:var(--mono);font-weight:700;text-align:center;color:var(--acc);background:#fff8ee}
.idc-tbl .d-full{font-family:var(--mono);font-weight:700;text-align:center;color:#7a6c00;background:#fffde7;border-left:2px solid #c9b800;border-right:2px solid #c9b800}
.idc-tbl .d-empty{font-family:var(--mono);font-weight:600;text-align:center;color:#c0392b;background:#fdecea;border-left:2px dashed #e74c3c;border-right:2px dashed #e74c3c;font-style:italic;font-size:11px}
.idc-tbl .e-data{font-family:var(--mono);font-weight:600;text-align:center;color:#2e7d32;background:#e8f5e9}
.idc-tbl .e-empty{font-family:var(--mono);font-weight:600;text-align:center;color:var(--ink4);background:#f4f7fa}
.idc-tbl tr.idc-sec td{background:var(--blue);color:#fff;font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.08em;padding:6px;border:none}
.idc-tbl .ref{font-size:9px;color:var(--ink4);font-family:var(--mono);display:block;margin-top:1px}
.idc-tbl .ico{font-size:10px;margin-left:3px}
.d-inp{width:100%;text-align:center;font-family:var(--mono);font-size:13px;font-weight:700;color:#7a6c00;background:transparent;border:none;outline:none;padding:2px}
.d-inp::placeholder{color:#c0392b;font-style:italic;font-weight:600;font-size:11px}
.d-pct-wrap{display:flex;align-items:center;justify-content:center;gap:2px}.d-pct-wrap .d-inp{width:calc(100% - 12px);min-width:42px}.d-pct-suf{font-family:var(--mono);font-size:11px;font-weight:800;color:#7a6c00;line-height:1}
.idc-upload-btn{transition:all .15s}
.idc-upload-btn:active{transform:scale(.97);background:#ffecd2}
.idc-flow{padding:12px 14px;background:var(--white);border-radius:14px;border:1.5px solid var(--border);margin-bottom:14px;font-size:11px;line-height:1.6;color:var(--ink3)}
.idc-flow b{color:var(--ink2)}
.idc-flow-step{display:flex;align-items:flex-start;gap:6px;margin-bottom:4px}
.idc-flow-n{width:18px;height:18px;border-radius:50%;background:var(--blue);color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}

/* ══ SIGNAL CARD ══ */
.signal-card{text-align:center;padding:28px 20px;border-radius:18px;margin-bottom:14px}
.signal-card.buy{background:var(--green-bg);border:2px solid rgba(21,128,61,.2)}
.signal-card.hold{background:var(--yellow-bg);border:2px solid rgba(161,98,7,.2)}
.signal-card.sell{background:var(--red-bg);border:2px solid rgba(220,38,38,.2)}
.signal-card.na{background:#e8edf2;border:2px solid var(--border)}
.signal-icon{font-size:48px;margin-bottom:8px}.signal-text{font-size:26px;font-weight:900}
.signal-sub{font-size:14px;color:var(--ink3);margin-top:6px;font-weight:600}

/* ══ LOADER ══ */
.loader-wrap{text-align:center;padding:60px 20px}
.loader{display:inline-block;width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{margin-top:14px;font-size:15px;font-weight:700;color:var(--ink3)}

/* ══ CHART CONTAINER ══ */
.chart-wrap{position:relative;height:220px;margin:10px 0}

/* ══ INFORME DE POSICIÓN ══ */
.rpt-header{padding:24px 20px;border-radius:18px;margin-bottom:14px;text-align:center;position:relative;overflow:hidden}
.rpt-header.profit{background:linear-gradient(135deg,#064e3b,#059669);color:#fff}
.rpt-header.loss{background:linear-gradient(135deg,#7f1d1d,#dc2626);color:#fff}
.rpt-header .rpt-tk{font-family:var(--mono);font-size:42px;font-weight:700;opacity:.15;position:absolute;right:16px;top:10px}
.rpt-header .rpt-title{font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.7;margin-bottom:4px}
.rpt-header .rpt-big{font-family:var(--mono);font-size:36px;font-weight:700}
.rpt-header .rpt-sub{font-size:14px;opacity:.8;margin-top:6px;font-weight:600}
.rpt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.rpt-cell{padding:16px 14px;background:var(--card);border:1.5px solid var(--border);border-radius:14px}
.rpt-cell-l{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:var(--ink4);margin-bottom:4px}
.rpt-cell-v{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--ink)}
.rpt-cell-v.up{color:var(--green)}.rpt-cell-v.dn{color:var(--red)}
.rpt-timeline{position:relative;padding-left:24px;margin:14px 0}
.rpt-timeline::before{content:'';position:absolute;left:8px;top:0;bottom:0;width:2px;background:var(--border)}
.rpt-event{position:relative;padding:12px 0 18px;font-size:13px}
.rpt-event::before{content:'';position:absolute;left:-20px;top:14px;width:12px;height:12px;border-radius:50%;border:2px solid var(--border);background:var(--white);z-index:1}
.rpt-event.buy::before{background:var(--green);border-color:var(--green)}
.rpt-event.sell::before{background:var(--red);border-color:var(--red)}
.rpt-event.div::before{background:var(--acc);border-color:var(--acc)}
.rpt-event-date{font-weight:800;color:var(--ink);font-family:var(--mono);font-size:12px}
.rpt-event-desc{color:var(--ink2);margin-top:2px;font-weight:600}
.rpt-event-val{font-family:var(--mono);font-weight:700;margin-top:2px}
.rpt-section{margin-bottom:14px}
.rpt-section-t{font-size:14px;font-weight:900;color:var(--blue);margin-bottom:10px;display:flex;align-items:center;gap:8px}

/* ══ OPCIONES — CALL CUBIERTA ══ */
.opt-alert{padding:14px 16px;border-radius:14px;background:var(--yellow-bg);border:1.5px solid rgba(180,83,9,.25);color:var(--yellow);font-size:13px;font-weight:800;line-height:1.45;margin-bottom:14px}
.opt-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
@media(max-width:559px){.opt-grid{grid-template-columns:1fr}}
.opt-field{margin-bottom:12px}
.opt-field label{display:block;font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin-bottom:6px}
.opt-field input,.opt-field select,.opt-field textarea{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:12px;background:#fff;color:var(--ink);font-family:var(--sans);font-size:14px;font-weight:700}
.opt-field textarea{min-height:74px;resize:vertical}
.opt-results{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
@media(max-width:559px){.opt-results{grid-template-columns:1fr}}
.opt-result{padding:12px;background:#f8fafc;border:1px solid var(--border);border-radius:12px}
.opt-result-l{font-size:10px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:var(--ink4);margin-bottom:4px}
.opt-result-v{font-family:var(--mono);font-size:15px;font-weight:800;color:var(--ink)}
.opt-result-v.up{color:var(--green)}.opt-result-v.warn{color:var(--yellow)}.opt-result-v.dn{color:var(--red)}
.opt-msg{padding:12px;border-radius:12px;font-size:13px;font-weight:800;line-height:1.4;margin-top:10px}
.opt-msg.err{background:var(--red-bg);color:var(--red);border:1px solid rgba(224,36,36,.2)}
.opt-msg.warn{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(180,83,9,.2)}
.opt-call{padding:14px 0;border-bottom:1px solid var(--border)}.opt-call:last-child{border-bottom:none}
.opt-call-top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.opt-call-title{font-family:var(--mono);font-size:17px;font-weight:800;color:var(--ink)}
.opt-call-sub{font-size:12px;font-weight:700;color:var(--ink3);line-height:1.45;margin-top:3px}
.opt-status{font-size:11px;font-weight:900;text-transform:uppercase;padding:5px 9px;border-radius:999px;background:#e8edf2;color:var(--ink3);white-space:nowrap}
.opt-status.open{background:var(--green-light);color:var(--green)}
.opt-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
@media(max-width:559px){.opt-actions{grid-template-columns:1fr 1fr}}
.opt-actions button{padding:9px 6px;border:1px solid var(--border);border-radius:10px;background:#fff;font-size:11px;font-weight:900;color:var(--ink3);font-family:var(--sans);cursor:pointer}
.opt-mode{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.opt-mode button{padding:13px 8px;border-radius:12px;border:1.5px solid var(--border);background:#fff;color:var(--ink3);font-family:var(--sans);font-size:13px;font-weight:900;cursor:pointer}
.opt-mode button.on.sim{background:var(--yellow-bg);border-color:rgba(180,83,9,.35);color:var(--yellow)}
.opt-mode button.on.real{background:var(--green-light);border-color:rgba(13,148,72,.35);color:var(--green)}
.opt-panel.sim{border-color:rgba(180,83,9,.35);background:#fffdf5}
.opt-panel.real{border-color:rgba(13,148,72,.28)}
.opt-sim-only{display:none}.opt-panel.sim .opt-sim-only{display:block}
.opt-call.simulated{background:#fffdf5;border:1px solid rgba(180,83,9,.25);border-radius:14px;padding:14px;margin-bottom:10px}
.opt-status.simulated{background:var(--yellow-bg);color:var(--yellow)}
.opt-chain-tools{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:end}
@media(max-width:559px){.opt-chain-tools{grid-template-columns:1fr}}
.opt-chain-meta{font-size:12px;color:var(--ink3);font-weight:800;line-height:1.45;margin:8px 0 12px}
.opt-chain-table{width:100%;border-collapse:separate;border-spacing:0 6px;font-size:12px}
.opt-chain-table th{text-align:right;color:var(--ink4);font-size:10px;text-transform:uppercase;letter-spacing:.04em;padding:0 6px 4px}
.opt-chain-table th:first-child,.opt-chain-table td:first-child{text-align:left}
.opt-chain-table td{padding:10px 6px;background:#f8fafc;border-top:1px solid var(--border);border-bottom:1px solid var(--border);text-align:right;font-family:var(--mono);font-weight:700;color:var(--ink)}
.opt-chain-table td:first-child{border-left:1px solid var(--border);border-radius:10px 0 0 10px}
.opt-chain-table td:last-child{border-right:1px solid var(--border);border-radius:0 10px 10px 0}
.opt-chain-table button{padding:8px 10px;border:1px solid var(--blue);border-radius:9px;background:var(--blue-light);color:var(--blue);font-family:var(--sans);font-size:11px;font-weight:900;cursor:pointer}
.opt-chain-scroll{overflow-x:auto}
.opt-analysis{margin-top:12px;padding:14px;border:1.5px solid var(--blue);border-radius:14px;background:#f8fbff}
.opt-analysis h3{font-size:16px;font-weight:900;color:var(--blue);margin-bottom:8px}
.opt-analysis-sec{margin-top:12px}
.opt-analysis-sec h4{font-size:12px;font-weight:900;text-transform:uppercase;letter-spacing:.05em;color:var(--ink3);margin-bottom:6px}
.opt-analysis p,.opt-analysis li{font-size:13px;line-height:1.5;color:var(--ink2);font-weight:700}
.opt-analysis ul{padding-left:18px}
.opt-chain-actions{display:flex;gap:6px;justify-content:flex-end}
.opt-chain-actions button:last-child{border-color:var(--yellow);background:var(--yellow-bg);color:var(--yellow)}
.sync-conflict,.unsaved-bar{display:none;margin:0 12px 10px;padding:12px;border-radius:12px;font-family:var(--sans);font-size:13px;font-weight:800;line-height:1.35}
.sync-conflict{border:1.5px solid rgba(180,83,9,.35);background:var(--yellow-bg);color:var(--yellow)}
.unsaved-bar{align-items:center;justify-content:space-between;gap:10px;border:1.5px solid rgba(180,83,9,.35);background:var(--yellow-bg);color:var(--yellow)}
.sync-conflict.open{display:block}
.unsaved-bar.open{display:flex}
.sync-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.sync-actions button,.unsaved-bar button{padding:9px 12px;border-radius:10px;border:1px solid rgba(180,83,9,.35);background:#fff;color:var(--yellow);font-family:var(--sans);font-size:12px;font-weight:900;cursor:pointer}
.sync-actions button.primary,.unsaved-bar button{background:var(--yellow);color:#fff;border-color:var(--yellow)}
</style>
</head>

    </div>
    <div class="mo-btns"><button class="mo-btn cancel" onclick="closeBuyM()">Cancelar</button><button class="mo-btn ok" onclick="confirmBuy()">✅ Confirmar compra</button></div>

</div>

// Local por defecto. En producción se configurará con la URL real del backend/subdominio autorizado.
window.BACKEND_URL = window.BACKEND_URL || '';
window.ANALISIS_PERSISTENCE_TOKEN = window.ANALISIS_PERSISTENCE_TOKEN || localStorage.getItem('analisis_persistence_token') || '';

function backendUrl(path){ return window.BACKEND_URL.replace(/\/$/, '') + path; }

async function backendFetch(path, options={}){
  const r = await fetch(backendUrl(path), {
    ...options,
    headers: { 'Content-Type': 'application/json', ...(options.headers||{}) }
  });
  const data = await r.json().catch(()=>null);
  if(!r.ok){
    const msg = data?.message || `Backend ${r.status}`;
    const error = new Error(msg);
    error.status = r.status;
    error.data = data;
    throw error;
  }
  return data;
}

async function backendFormFetch(path, formData, options={}){
  const r = await fetch(backendUrl(path), {
    ...options,
    method: options.method || 'POST',
    body: formData,
    headers: options.headers || {}
  });
  const data = await r.json().catch(()=>null);
  if(!r.ok){
    const msg = data?.message || `Backend ${r.status}`;
    throw new Error(msg);
  }
  return data;
}

function parseStoredTime(key){
  const value = localStorage.getItem(key);
  const time = value ? Date.parse(value) : NaN;
  return Number.isFinite(time) ? time : null;
}
function hasLocalUnsavedChanges(){
  if(!localStorage.getItem('idc7')) return false;
  const updatedAt = parseStoredTime('idc7_updatedAt');
  const syncedAt = parseStoredTime('idc7_syncedAt');
  if(updatedAt == null) return syncedAt == null;
  return updatedAt != null && (syncedAt == null || updatedAt > syncedAt);
}
function markLocalPortfolioUpdated(){
  localStorage.setItem('idc7_updatedAt', new Date().toISOString());
  refreshUnsavedBar();

function markSnapshotSynced(updatedAt){
  if(!updatedAt) return;
  localStorage.setItem('idc7_syncedAt', updatedAt);
  refreshUnsavedBar();
}
function formatSyncTime(value){
  const d = value ? new Date(value) : null;
  if(!d || isNaN(d.getTime())) return null;
  return d.toLocaleString('es-ES', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
}
function isSyncConflictVisible(){
  return !!document.getElementById('sync-conflict')?.classList.contains('open');
}
function refreshUnsavedBar(){
  const bar = document.getElementById('unsaved-bar');
  if(bar) bar.classList.toggle('open', hasLocalUnsavedChanges() && !isSyncConflictVisible());
}
function hideSyncConflict(){
  const el = document.getElementById('sync-conflict');
  if(el){ el.classList.remove('open'); el.innerHTML=''; }
  refreshUnsavedBar();
}

function countPortfolioPositionsFromIdc7(idc7){
  let parsed = idc7;
  if(typeof parsed === 'string'){
    try { parsed = JSON.parse(parsed); } catch(e){ parsed = null; }
  }
  return Array.isArray(parsed?.c) ? parsed.c.filter(item => String(item?.tk || item?.symbol || item?.ticker || '').trim()).length : 0;
}

function clearLocalValuationStores(){
  const keys = [];
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    if(k && (k.startsWith('val_data_') || k.startsWith('idc_inputs_'))) keys.push(k);
  }
  keys.forEach(k=>localStorage.removeItem(k));
}

function buildPersistenceSnapshot(){
  const valuations = {};
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    if(k && (k.startsWith('val_data_') || k.startsWith('idc_inputs_'))) valuations[k.replace(/^idc_inputs_/,'val_data_')] = localStorage.getItem(k);
  }
  return {
    schemaVersion: 1,
    idc7: livePortfolioSnapshot(),
    valuations,
    brokerTariffs: localStorage.getItem('brokerTariffs'),
    fxRates: JSON.stringify(FX_RATES),
    coveredCalls: loadCoveredCalls()
  };
}

function applySnapshotToLocal(snapshot, options={}){
  if(!snapshot || countPortfolioPositionsFromIdc7(snapshot.idc7) < 1) return false;
  localStorage.setItem('idc7', snapshot.idc7);
  if(snapshot.brokerTariffs != null) localStorage.setItem('brokerTariffs', snapshot.brokerTariffs);
  else localStorage.removeItem('brokerTariffs');
  if(snapshot.fxRates != null) localStorage.setItem('fxRates', snapshot.fxRates);
  else localStorage.removeItem('fxRates');
  if(Array.isArray(snapshot.coveredCalls)) localStorage.setItem('coveredCalls', JSON.stringify(snapshot.coveredCalls));
  else localStorage.removeItem('coveredCalls');
  clearLocalValuationStores();
  Object.entries(snapshot.valuations || {}).forEach(([k,v])=> localStorage.setItem(k, v));
  if(snapshot.updatedAt){
    localStorage.setItem('idc7_updatedAt', snapshot.updatedAt);
    if(options.markSynced !== false) localStorage.setItem('idc7_syncedAt', snapshot.updatedAt);
  }
  refreshUnsavedBar();
  return true;
}
function showSyncConflict(snapshot){
  const el = document.getElementById('sync-conflict');
  if(!el) return;
  const localTime = localStorage.getItem('idc7_updatedAt');
  const serverTime = snapshot?.updatedAt || null;
  const localText = formatSyncTime(localTime);
  const serverText = formatSyncTime(serverTime) || 'hora desconocida';
  const message = localText
    ? `Tienes cambios sin guardar de las ${localText}. El servidor tiene una copia de las ${serverText}. ¿Qué quieres hacer?`
    : `Tienes cambios en este navegador, sin fecha conocida. El servidor tiene una copia de las ${serverText}. ¿Qué quieres hacer?`;
  window.pendingServerSnapshot = snapshot;
  el.innerHTML = `${message}
    <div class="sync-actions">
      <button class="primary" onclick="syncSnapshotToServer({skipConfirm:true}).catch(err=>toast('❌ '+err.message))">Subir mis cambios</button>
      <button onclick="bringServerSnapshot()">Traer la del servidor</button>
      <button onclick="hideSyncConflict()">Decidir luego</button>
    </div>`;
  el.classList.add('open');
  refreshUnsavedBar();
}
function bringServerSnapshot(){
  const snapshot = window.pendingServerSnapshot;
  if(!snapshot){ hideSyncConflict(); return; }
  if(!applySnapshotToLocal(snapshot, {markSynced:true})){ toast('❌ El servidor no tiene cartera válida para cargar'); return; }
  hideSyncConflict();
  loadFxRates();
  load();
  updC();
  go(cur);
  toast('✅ Copia del servidor cargada');
}

async function syncSnapshotToServer(options={}){
  const headers = persistenceHeaders();
  if(!headers){ toast('Configura el token de persistencia antes de sincronizar'); return; }
  const snapshot = buildPersistenceSnapshot();
  const positionCount = countPortfolioPositionsFromIdc7(snapshot.idc7);
  if(positionCount < 1){ toast('❌ No se puede guardar una cartera vacía'); return; }
  if(!options.skipConfirm && !confirm('Esto reemplazará la cartera guardada en el servidor por la que tienes ahora en pantalla. ¿Continuar?')) return;
  const data = await backendFetch('/api/persistence/snapshot', { method:'PUT', headers, body: JSON.stringify({ snapshot }) });
  const saved = data?.snapshot || {};
  const savedCount = countPortfolioPositionsFromIdc7(saved.idc7);
  if(data?.status !== 'ok' || !saved.updatedAt || savedCount < 1) throw new Error('El servidor no confirmó el guardado');
  markSnapshotSynced(saved.updatedAt);
  hideSyncConflict();
  toast(`✅ ${positionCount} posiciones guardadas en servidor`);
}

async function loadSnapshotFromServer(){
  const headers = persistenceHeaders();
  if(!headers){ toast('Configura el token de persistencia antes de cargar'); return; }
  if(!confirm('Esto reemplazará tu cartera actual en este navegador por la del servidor. ¿Continuar?')) return;
  const data = await backendFetch('/api/persistence/snapshot', { headers });
  const snapshot = data.snapshot || {};
  const positionCount = countPortfolioPositionsFromIdc7(snapshot.idc7);
  if(positionCount < 1){ toast('❌ El servidor no tiene cartera válida para cargar'); return; }
  applySnapshotToLocal(snapshot, {markSynced:true});
  toast(`✅ ${positionCount} posiciones cargadas del servidor — recargando...`);
  setTimeout(()=>location.reload(), 1000);
}

    'quote': 'quote',
    'income-statement': 'income-statement',
    'balance-sheet-statement': 'balance-sheet',

  if(!backendEndpoint) throw new Error('Endpoint FMP no soportado por backend: '+endpoint);
  return backendFetch(`/api/fmp/${backendEndpoint}/${encodeURIComponent(tk)}`);
}

function getValuationConfig(){
  const defaults = { capInicial: 0.30, tasaTerminal: 0.12, descuentoMultiplo: 0.10 };
  try {
    const tickerCfg = window._valData && window._valData.ticker ? (readValStore(window._valData.ticker).config||{}) : {};
    const saved = Object.assign({}, JSON.parse(localStorage.getItem('idc_valuation_config')||'{}'), tickerCfg);
    return {
      capInicial: saved.capInicial!=null ? Number(saved.capInicial) : defaults.capInicial,
      tasaTerminal: saved.tasaTerminal!=null ? Number(saved.tasaTerminal) : defaults.tasaTerminal,
      descuentoMultiplo: saved.descuentoMultiplo!=null ? Number(saved.descuentoMultiplo) : defaults.descuentoMultiplo,
    };
  } catch(e){ return defaults; }
}
function setValuationConfig(key, val){
  const cfg = getValuationConfig();
  let num = parseFloat(val);
  if(!isFinite(num)) return;
  if(Math.abs(num)>=1) num = num/100;
  cfg[key] = num;
  localStorage.setItem('idc_valuation_config', JSON.stringify(cfg));
  if(window._valData && window._valData.ticker){ const stored = readValStore(window._valData.ticker); stored.config = cfg; writeValStore(window._valData.ticker, stored); }
  rConfig();
  toast('Config valoración guardada');
}
function buildSalesGrowthPath(medSalesGr, cfg=getValuationConfig()){
  if(medSalesGr < cfg.tasaTerminal) return Array(5).fill(medSalesGr);
  const start = Math.min(medSalesGr, cfg.capInicial);
  return Array(5).fill(0).map((_,i)=> start + (cfg.tasaTerminal - start) * (i/4));
}

    const legacy = JSON.parse(localStorage.getItem('idc_inputs_'+ticker)||'null');
    if(legacy){ localStorage.setItem(key, JSON.stringify(legacy)); return legacy; }

// Replica exacta de las fórmulas del Excel "Invertir Desde Cero"
function calcIDC(data){
  const {quote, is, bs, cf} = data;
  const valuationCfg = getValuationConfig();
  const n = is.length; // años disponibles (hasta 5 en plan gratuito)
  const price = quote.price;
  const years = is.map(x => new Date(x.date).getFullYear());

  // ═══ 1. INCOME STATEMENT ═══
  const sales = is.map(x => x.revenue / 1e6);
  const ebit = is.map(x => x.operatingIncome / 1e6);
  const da = cf.map(x => Math.abs(x.depreciationAndAmortization || 0) / 1e6);
  const ebitda = ebit.map((e,i) => e + da[i]);
  const intExp = is.map(x => (x.interestExpense || 0) / 1e6);
  const intInc = is.map(x => (x.interestIncome || 0) / 1e6);
  const totalInt = intExp.map((e,i) => -Math.abs(e) + (intInc[i]||0));
  const ebt = ebit.map((e,i) => e + totalInt[i]);
  const taxExp = is.map(x => Math.abs(x.incomeTaxExpense || 0) / 1e6);
  const taxRate = ebt.map((e,i) => e > 0 ? taxExp[i] / e : 0);
  const netIncome = is.map(x => x.netIncome / 1e6);
  const shares = is.map(x => (x.weightedAverageShsOutDil || x.weightedAverageShsOut) / 1e6);
  const eps = netIncome.map((ni,i) => shares[i] ? ni / shares[i] : 0);

  // Márgenes
  const ebitdaMargin = ebitda.map((e,i) => sales[i] ? e / sales[i] : 0);
  const ebitMargin = ebit.map((e,i) => sales[i] ? e / sales[i] : 0);

  // ═══ 2. BALANCE SHEET (para ROIC y Deuda Neta) ═══
  const cash = bs.map(x => (x.cashAndCashEquivalents || 0) / 1e6);
  const mktSec = bs.map(x => ((x.shortTermInvestments || 0)) / 1e6);
  const stDebt = bs.map(x => ((x.shortTermDebt || 0) + (x.currentPortionOfLongTermDebt || 0)) / 1e6);
  const ltDebt = bs.map(x => (x.longTermDebt || 0) / 1e6);
  const equity = bs.map(x => (x.totalStockholdersEquity || 0) / 1e6);
  const deudaNeta = stDebt.map((s,i) => (s + ltDebt[i]) - (cash[i] + mktSec[i]));
  const dnEbitda = deudaNeta.map((dn,i) => ebitda[i] ? dn / ebitda[i] : 0);

  // ═══ 3. FCF (fórmula IDC) ═══
  const capexTotal = cf.map(x => (x.capitalExpenditure || 0) / 1e6); // negativo
  const capexMant = da.map((d,i) => Math.min(Math.abs(capexTotal[i]), d)); // min(|capex|, D&A)
  const ar = bs.map(x => (x.netReceivables || 0) / 1e6);
  const ap = bs.map(x => (x.accountPayables || 0) / 1e6);
  const inv = bs.map(x => (x.inventory || 0) / 1e6);
  const wc = ar.map((a,i) => inv[i] + a - ap[i]);
  const cwc = wc.map((w,i) => i===0 ? 0 : w - wc[i-1]);
  const fcf = ebitda.map((eb,i) => eb - capexMant[i] + totalInt[i] - taxExp[i] - cwc[i]);
  const fcfMargin = fcf.map((f,i) => sales[i] ? f / sales[i] : 0);

  // ═══ 4. ROIC ═══
  const nopat = ebit.map((e,i) => e * (1 - taxRate[i]));
  const investedCapital = equity.map((eq,i) => eq + stDebt[i] + ltDebt[i] - mktSec[i]);
  const roic = nopat.map((no,i) => investedCapital[i] ? no / investedCapital[i] : 0);
  const roe = netIncome.map((ni,i) => equity[i] ? ni / equity[i] : 0);

  // ═══ 5. MARKET CAP y EV (calculados, no de endpoint) ═══
  const lastShares = shares[n-1];
  // MCap histórico: usamos shares de cada año × precio de cierre implícito (EV = MCap + DeudaNeta)
  // Como no tenemos precio histórico por año, usamos el ratio del quote actual
  // Mejor aproximación: MCap = netIncome × PER implícito del quote
  const currentMcap = (quote.marketCap || price * lastShares * 1e6) / 1e6;
  // Para calcular MCap histórico, usamos key-metrics si disponible, si no aproximamos
  // Aproximación: shares[i] * (netIncome[i]/shares[i]) * (currentMcap/netIncome[n-1])
  const mcap = shares.map((s, i) => {
    // Usar proporción de beneficios respecto al último año para estimar MCap histórico
    if(netIncome[n-1] && netIncome[i]) return currentMcap * (netIncome[i] / netIncome[n-1]) * (shares[n-1] / s);
    return currentMcap;
  });
  const evArr = mcap.map((m,i) => m + deudaNeta[i]);

  // ═══ 6. MÚLTIPLOS HISTÓRICOS ═══
  const per = mcap.map((m,i) => netIncome[i] > 0 ? m / netIncome[i] : null);
  const evFcf = evArr.map((e,i) => fcf[i] > 0 ? e / fcf[i] : null);
  const evEbitda = evArr.map((e,i) => ebitda[i] > 0 ? e / ebitda[i] : null);
  const evEbit = evArr.map((e,i) => ebit[i] > 0 ? e / ebit[i] : null);

  const median = arr => { const v=arr.filter(x=>x!=null&&x>0&&isFinite(x)).sort((a,b)=>a-b); if(!v.length)return 0; const m=Math.floor(v.length/2); return v.length%2?v[m]:(v[m-1]+v[m])/2; };

  const medPer = median(per);
  const medEvFcf = median(evFcf);
  const medEvEbitda = median(evEbitda);
  const medEvEbit = median(evEbit);

  // ═══ 7. ESTIMACIONES (5 años) ═══
  // Crecimientos conservadores basados en medianas históricas -10%
  const lastSalesGr = sales.length>=2 ? (sales.slice(1).map((s,i)=>sales[i]?s/sales[i]-1:0)) : [0.05];
  const medSalesGr = Math.max(median(lastSalesGr) * 0.9, 0.03); // al menos 3%
  const lastEbitMargin = median(ebitMargin);
  const lastTaxRate = median(taxRate);
  const lastDnEbitda = dnEbitda[n-1] || 0;
  const lastCapexPct = median(capexMant.map((c,i)=>sales[i]?c/sales[i]:0));
  const lastWcPct = median(wc.map((w,i)=>sales[i]?w/sales[i]:0));
  const lastSharesGr = shares.length>=3 ? median(shares.slice(1).map((s,i)=>shares[i]?s/shares[i]-1:0)) : -0.01;

  const estYears = [];
  const estSales = [], estEbitda = [], estEbit = [], estDa = [], estNi = [], estFcf = [];
  const estShares = [], estEps = [], estDn = [], estEv = [], estMcap = [];

  let prevSales = sales[n-1], prevShares = shares[n-1], prevWc = wc[n-1];
  const lastYear = years[n-1];

  for(let y=1; y<=5; y++){
    const yr = lastYear + y;
    estYears.push(yr+'e');
    const gr = buildSalesGrowthPath(medSalesGr, valuationCfg)[y-1]; // convergencia lineal configurable
    const s = prevSales * (1 + gr);
    const eb = s * lastEbitMargin;
    const d = da[n-1] * (1 + gr); // D&A crece con ventas
    const ebitE = eb - d;
    const taxE = lastTaxRate;
    const intE = totalInt[n-1]; // mantener intereses
    const ebtE = ebitE + intE;
    const niE = ebtE * (1 - taxE);
    const capM = s * lastCapexPct;
    const wcE = s * lastWcPct;
    const cwcE = wcE - prevWc;
    const fcfE = eb - capM + intE - ebtE * taxE - cwcE;
    const shrE = prevShares * (1 + lastSharesGr);
    const epsE = shrE ? niE / shrE : 0;
    const dnEbitdaE = lastDnEbitda; // mantener ratio
    const dnE = dnEbitdaE * eb;
    const mcapE = price * shrE; // MCap estimada con precio actual
    const evE = mcapE + dnE;

    estSales.push(s); estEbitda.push(eb); estEbit.push(ebitE); estDa.push(d);
    estNi.push(niE); estFcf.push(fcfE); estShares.push(shrE); estEps.push(epsE);
    estDn.push(dnE); estMcap.push(mcapE); estEv.push(evE);
    prevSales = s; prevShares = shrE; prevWc = wcE;
  }

  // ═══ 8. MÚLTIPLOS OBJETIVO (conservador: mediana - descuento configurable) ═══
  const discountFactor = 1 - valuationCfg.descuentoMultiplo;
  const calcObjPer = Math.round(medPer * discountFactor);
  const calcObjEvFcf = Math.round(medEvFcf * discountFactor);
  const calcObjEvEbitda = Math.round(medEvEbitda * discountFactor);
  const calcObjEvEbit = Math.round(medEvEbit * discountFactor);
  const objPer = calcObjPer;
  const objEvFcf = calcObjEvFcf;
  const objEvEbitda = calcObjEvEbitda;
  const objEvEbit = calcObjEvEbit;

  // ═══ 9. PRECIO OBJETIVO (fórmulas exactas del Excel) ═══
  const lastSharesEst = estShares; // shares por año estimado
  const precioObj = { perExCash:[], evFcf:[], evEbitda:[], evEbit:[], prom:[] };

  for(let i=0; i<5; i++){
    const dn = estDn[i];
    const shr = estShares[i];
    // PER ex Cash: IF(DN<0, NI*PER_obj - DN, NI*PER_obj) / Shares
    const pPer = dn < 0 ? (estNi[i]*objPer - dn)/shr : (estNi[i]*objPer)/shr;
    // EV/FCF: (FCF*Mult - DN) / Shares
    const pFcf = (estFcf[i]*objEvFcf - dn)/shr;
    // EV/EBITDA: (EBITDA*Mult - DN) / Shares
    const pEbitda = (estEbitda[i]*objEvEbitda - dn)/shr;
    // EV/EBIT: (EBIT*Mult - DN) / Shares
    const pEbit = (estEbit[i]*objEvEbit - dn)/shr;
    const validMethods = [pPer, pFcf, pEbitda, pEbit].filter(x => x > 0 && isFinite(x));
    const avg = validMethods.length ? validMethods.reduce((a,b)=>a+b,0) / validMethods.length : 0;

    precioObj.perExCash.push(pPer);
    precioObj.evFcf.push(pFcf);
    precioObj.evEbitda.push(pEbitda);
    precioObj.evEbit.push(pEbit);
    precioObj.prom.push(avg);
  }

  // ═══ 10. CAGR y MARGEN DE SEGURIDAD ═══
  const cagr5 = {
    per: price>0 ? Math.pow(precioObj.perExCash[4]/price, 1/5)-1 : 0,
    fcf: price>0 ? Math.pow(precioObj.evFcf[4]/price, 1/5)-1 : 0,
    ebitda: price>0 ? Math.pow(precioObj.evEbitda[4]/price, 1/5)-1 : 0,
    ebit: price>0 ? Math.pow(precioObj.evEbit[4]/price, 1/5)-1 : 0,
    prom: price>0 ? Math.pow(precioObj.prom[4]/price, 1/5)-1 : 0,
  };

  const margenSeg = precioObj.evFcf.map(p => price>0 ? p/price - 1 : 0);

  // ═══ 11. PRECIO COMPRA PARA 15% ANUAL ═══
  const retObj = 0.15;
  const precioCompra15 = precioObj.evFcf[4] > 0 ? precioObj.evFcf[4] / Math.pow(1+retObj, 5) : 0;
  const difVsActual = price > 0 ? (precioCompra15 - price) / price : 0;

  // ═══ 12. SEMÁFORO ═══
  const ms5 = margenSeg[4] || 0; // margen seguridad a 5 años (EV/FCF)
  let signal = 'na', signalText = 'Sin datos';
  if(ms5 >= 0.50){ signal='buy'; signalText='COMPRAR'; }
  else if(ms5 >= 0.15){ signal='hold'; signalText='MANTENER'; }
  else { signal='sell'; signalText='ESPERAR'; }

  return {
    ticker: quote.symbol, name: quote.companyName || quote.symbol, price, currency: quote.currency||'USD',
    years, estYears, n,
    // Históricos
    sales, ebitda, ebitdaMargin, ebit, ebitMargin, da, netIncome, eps, shares, taxRate,
    intExp, intInc, totalInt, ebt, fcf, fcfMargin,
    cash, mktSec, stDebt, ltDebt, equity, deudaNeta, dnEbitda,
    mcap, evArr, roic, roe,
    per, evFcf, evEbitda, evEbit, medPer, medEvFcf, medEvEbitda, medEvEbit,
    wc, cwc, capexMant, investedCapital, nopat,
    // Estimaciones
    estSales, estEbitda, estEbit, estDa, estNi, estFcf, estShares, estEps, estDn, estMcap, estEv,
    // Objetivo
    objPer, objEvFcf, objEvEbitda, objEvEbit, calcObjPer, calcObjEvFcf, calcObjEvEbitda, calcObjEvEbit, valuationCfg,
    precioObj, cagr5, margenSeg, signal, signalText,
    precioCompra15, retObj, difVsActual,
    // Ratios estimaciones
    medSalesGr, lastEbitMargin, lastTaxRate, lastDnEbitda, lastCapexPct, lastWcPct, lastSharesGr,
    // Arrays de crecimiento por año (para edición individual)
    estSalesGr: buildSalesGrowthPath(medSalesGr, valuationCfg),
    estEbitMgn: Array(5).fill(lastEbitMargin),
  };
}

/* ════════════════════════════════════════════════
   RENDERIZAR VISTA DE VALORACIÓN IDC

function renderValoracionIDC(v, el, backTo){
  const ff = (n,d=2) => n==null?'—':Number(n).toLocaleString('es-ES',{minimumFractionDigits:d,maximumFractionDigits:d});

  const fx = (n) => n==null?'—':Number(n).toLocaleString('es-ES',{minimumFractionDigits:1,maximumFractionDigits:1})+'x';

  let h = `<button class="det-back" onclick="go('${backTo}')">← Volver</button>`;

      <span style="font-family:var(--mono);font-size:36px;font-weight:700">${ff(v.price,2)}</span>
      <span style="font-size:15px;color:var(--ink3)">${v.currency}</span>
    </div>
  </div>`;

  // ═══ SEMÁFORO ═══
  const sigIcon = v.signal==='buy'?'🟢':v.signal==='hold'?'🟡':'🔴';
  const sigCls = v.signal==='buy'?'buy':v.signal==='hold'?'hold':'sell';
  h += `<div class="signal-card ${sigCls}">
    <div class="signal-icon">${sigIcon}</div>
    <div class="signal-text">${v.signalText}</div>
    <div class="signal-sub">Margen de seguridad ${fp(v.margenSeg[4])} (EV/FCF 5 años)</div>
  </div>`;

  // ═══ RESUMEN RÁPIDO ═══
  h += `<div class="stats">
    <div class="stat ${v.cagr5.prom>=0.15?'glow-up':''}"><div class="stat-v">${fp(v.cagr5.prom)}</div><div class="stat-l">GANANCIA ANUAL ESPERADA</div><div class="stat-sub">media al año, a 5 años</div></div>
    <div class="stat"><div class="stat-v">${ff(v.precioObj.prom[4],2)}</div><div class="stat-l">PRECIO OBJETIVO EN 5 AÑOS</div><div class="stat-sub">a dónde puede llegar</div></div>
    <div class="stat"><div class="stat-v">${ff(v.precioCompra15,2)}</div><div class="stat-l">PRECIO MÁXIMO DE COMPRA</div><div class="stat-sub">para ganar un 15% al año</div></div>
    <div class="stat ${v.difVsActual>=0?'glow-up':'glow-dn'}"><div class="stat-v">${fp(v.difVsActual)}</div><div class="stat-l">¿BARATA O CARA HOY?</div><div class="stat-sub">+ barata · − cara</div></div>
  </div>`;

  // ═══ ACCIONES STICKY ═══
  if(v.manualMode) h += `<div class="card" style="border-color:var(--yellow-bg);background:var(--yellow-bg);color:var(--yellow);font-weight:800">Símbolo no disponible en tu plan de FMP — modo manual</div>`;
  h += `<div class="val-sticky-actions">
    <input type="file" id="xlUpload" accept=".xlsx,.xls" style="display:none" onchange="handleExcelUpload(event)">
    <button id="valRecalcBtn" class="recalc-btn" onclick="recalcObj()">🔄 Recalcular</button>
    <button class="idc-upload-btn" onclick="document.getElementById('xlUpload').click()">📁 <span class="wide-label">Subir Excel de ${v.ticker}</span><span class="compact-label">Excel</span></button>
    <button class="act-btn rd" style="grid-column:1/-1" onclick="clearValStore('${v.ticker}')">🗑 <span class="wide-label">Borrar datos de ${v.ticker}</span><span class="compact-label">Borrar</span></button>
  </div>`;
  setTimeout(updateRecalcButtonState,0);

  // ═══ TABS DE DETALLE ═══
  h += `<div class="dtabs">
    <div class="dtab on" onclick="valTab('base')">Base</div>
    <div class="dtab" onclick="valTab('mult')">Múltiplos</div>
    <div class="dtab" onclick="valTab('obj')">Objetivo</div>
    <div class="dtab" onclick="valTab('graf')">Gráficos</div>
  </div>`;

  // ═══ TAB BASE: Valoración base + IS resumen ═══
  h += `<div class="dpanel on" id="vp-base">`;

  // Tabla: Valoración (millones)
  h += `<div class="val-section"><div class="val-section-t">Valoración (millones)</div><div class="val-scroll"><table class="vt"><thead><tr><th></th>`;
  v.years.forEach(y => h += `<th>${y}</th>`);
  v.estYears.forEach(y => h += `<th class="est">${y}</th>`);
  h += `</tr></thead><tbody>`;

  const addRow = (label, hist, est, dec=0, highlight=false) => {
    h += `<tr${highlight?' class="hi"':''}><td>${label}</td>`;
    hist.forEach(x => h += `<td>${ffm(x)}</td>`);
    if(est) est.forEach(x => h += `<td class="est-c">${ffm(x)}</td>`);
    h += `</tr>`;
  };
  const addRowPct = (label, hist, est, highlight=false) => {
    h += `<tr${highlight?' class="hi"':''}><td>${label}</td>`;
    hist.forEach(x => h += `<td>${fp(x)}</td>`);
    if(est) est.forEach(x => h += `<td class="est-c">${fp(x)}</td>`);
    h += `</tr>`;
  };

  addRow('Market Cap', v.mcap, v.estMcap);
  addRow('Deuda Neta', v.deudaNeta, v.estDn);
  h += `<tr><td>DN/EBITDA</td>`;
  v.dnEbitda.forEach(x => h += `<td>${fx(x)}</td>`);
  for(let i=0;i<5;i++) h += `<td class="est-c">${fx(v.lastDnEbitda)}</td>`;
  h += `</tr>`;
  addRow('Enterprise Value', v.evArr, v.estEv);
  h += `<tr class="sep"></tr>`;
  addRow('Sales', v.sales, v.estSales);
  addRow('EBITDA', v.ebitda, v.estEbitda);
  addRowPct('  Margen EBITDA', v.ebitdaMargin, Array(5).fill(v.lastEbitMargin));
  addRow('EBIT', v.ebit, v.estEbit);
  addRow('Net Income', v.netIncome, v.estNi);
  addRow('FCF', v.fcf, v.estFcf, 0, true);
  addRowPct('  FCF Margin', v.fcfMargin, v.estFcf.map((f,i)=>v.estSales[i]?f/v.estSales[i]:0));
  h += `<tr class="sep"></tr>`;
  h += `<tr><td>EPS</td>`; v.eps.forEach(x=>h+=`<td>${ff(x,2)}</td>`); v.estEps.forEach(x=>h+=`<td class="est-c">${ff(x,2)}</td>`); h+=`</tr>`;
  h += `<tr><td>Shares (M)</td>`; v.shares.forEach(x=>h+=`<td>${ffm(x)}</td>`); v.estShares.forEach(x=>h+=`<td class="est-c">${ffm(x)}</td>`); h+=`</tr>`;
  addRowPct('  Tax Rate', v.taxRate, Array(5).fill(v.lastTaxRate));
  addRowPct('ROIC', v.roic, []);
  addRowPct('ROE', v.roe, []);
  h += `</tbody></table></div></div>`;
  h += `</div>`; // fin tab base

  // ═══ TAB MÚLTIPLOS ═══
  h += `<div class="dpanel" id="vp-mult">`;

  // Flujo explicativo
  h += `<div class="idc-flow">
    <div class="idc-flow-step"><div class="idc-flow-n">1</div><div><b>C</b> se rellena sola con FMP o modo manual</div></div>
    <div class="idc-flow-step"><div class="idc-flow-n">2</div><div>Subes Excel → <b>E</b> se rellena y se copia completa a <b>D</b></div></div>
    <div class="idc-flow-step"><div class="idc-flow-n">3</div><div>Loren ajusta en <b>D</b> lo que quiera y pulsa Recalcular</div></div>
    <div style="text-align:center;font-weight:800;color:var(--blue);margin-top:4px">Prioridad: D → E → FMP / manual</div>
  </div>`;

  // Datos guardados por empresa (localStorage)
  const stored = readValStore(v.ticker);
  const exd = stored.excel || {}; // columna E
  const adj = stored.adjust || {}; // columna D

  // Tipos de formato: 'price', 'pct', 'x', 'int', 'millions'
  const fmtVal = (val, fmt) => {
    if(val==null || val==='') return '—';
    const n = Number(val);
    if(isNaN(n)) return '—';
    if(fmt==='pct') return (n < 1 && n > -1 ? n*100 : n).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+'%';
    if(fmt==='x') return n.toLocaleString('es-ES',{minimumFractionDigits:1,maximumFractionDigits:1})+'x';
    if(fmt==='int') return Math.round(n).toLocaleString('es-ES');
    if(fmt==='price') return n.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2});
    if(fmt==='millions') {
      return n.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:4});
    }
    return n.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:4});
  };

  // Helper: generar fila
  const idcRow = (key, label, ref, cVal, isAuto, fmt='int') => {
    const eVal = exd[key]!=null ? exd[key] : null;
    let dVal = adj[key]!=null ? adj[key] : null;
    // Si auto y E tiene dato → D se rellena de E
    if(isAuto && eVal!=null && dVal==null) dVal = eVal;
    // C toma de D si existe, si no de cVal (FMP)
    const cFinal = dVal!=null ? dVal : cVal;
    const ico = isAuto ? '⚡' : '✋';

    const cDisplay = fmtVal(cFinal, fmt);
    const dDisplay = fmtVal(dVal, fmt);
    const eDisplay = fmtVal(eVal, fmt);
    const dClass = dVal!=null ? 'd-full' : 'd-empty';

    // Input editable en D para los manuales
    // Para inputs: mostrar el valor en formato legible (ej: 13 para 13%, no 0.13)
    const dInputVal = dVal!=null ? (fmt==='pct' ? (dVal*100).toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}) : dVal) : '';
    const dHtml = isAuto

      : `<td class="${dClass}">${fmt==='pct'?`<span class="d-pct-wrap"><input class="d-inp" data-key="${key}" data-fmt="${fmt}" value="${dInputVal}" placeholder="pendiente" onchange="updateD('${v.ticker}','${key}',this.value,'${fmt}')"><span class="d-pct-suf">%</span></span>`:`<input class="d-inp" data-key="${key}" data-fmt="${fmt}" value="${dInputVal}" placeholder="pendiente" onchange="updateD('${v.ticker}','${key}',this.value,'${fmt}')">`}</td>`;

    return `<tr><td>${label}<span class="ico">${ico}</span><span class="ref">${ref}</span></td><td class="c-app">${cDisplay}</td>${dHtml}<td class="${eVal!=null?'e-data':'e-empty'}">${eDisplay}</td></tr>`;
  };

  const secRow = (title) => `<tr class="idc-sec"><td colspan="4">${title}</td></tr>`;

  h += `<div class="val-scroll"><table class="idc-tbl"><thead><tr><th>Input</th><th>C · App</th><th>D · Tu ajuste</th><th>E · Excel</th></tr></thead><tbody>`;

  // ═══ VALORACIÓN ═══
  h += secRow('VALORACIÓN');
  h += idcRow('price','Precio actual ($)','4.Val B19', v.price, true, 'price');
  h += idcRow('dnEbitda','Deuda neta / EBITDA','4.Val L5', v.lastDnEbitda, true, 'x');
  h += idcRow('retObj','Retorno objetivo (%)','4.Val B51', v.retObj, true, 'pct');

  // ═══ MÚLTIPLOS OBJETIVO ═══
  h += secRow('MÚLTIPLOS OBJETIVO');
  h += idcRow('objPer','PER','4.Val B22', v.objPer, true, 'int');
  h += idcRow('objEvFcf','EV / FCF','4.Val B23', v.objEvFcf, true, 'int');
  h += idcRow('objEvEbitda','EV / EBITDA','4.Val B24', v.objEvEbitda, true, 'int');
  h += idcRow('objEvEbit','EV / EBIT','4.Val B25', v.objEvEbit, true, 'int');

  // ═══ CRECIMIENTO VENTAS ═══
  h += secRow('ESTIMACIÓN — CRECIMIENTO VENTAS');

function valTab(tab){

  document.querySelectorAll('#v-valoracion .dpanel').forEach(p=>p.classList.remove('on'));

  if(p) p.classList.add('on');
  if(tab==='graf' && window._valData) setTimeout(()=>renderCharts(window._valData),50);
}

function recalcObj(){
  if(!window._valData) return;
  if(window._valData.manualMode){
    window._valData = createManualValuation(window._valData.ticker, window._valData.fmpError);
  }
  const v = window._valData;
  v.pendingRecalc = false;
  const stored = readValStore(v.ticker);
  const adj = stored.adjust || {};

  // Leer múltiplos de D si existen, si no del cálculo FMP
  v.objPer = adj.objPer!=null ? Number(adj.objPer) : (v.calcObjPer!=null ? v.calcObjPer : v.objPer);
  v.objEvFcf = adj.objEvFcf!=null ? Number(adj.objEvFcf) : (v.calcObjEvFcf!=null ? v.calcObjEvFcf : v.objEvFcf);
  v.objEvEbitda = adj.objEvEbitda!=null ? Number(adj.objEvEbitda) : (v.calcObjEvEbitda!=null ? v.calcObjEvEbitda : v.objEvEbitda);
  v.objEvEbit = adj.objEvEbit!=null ? Number(adj.objEvEbit) : (v.calcObjEvEbit!=null ? v.calcObjEvEbit : v.objEvEbit);
  v.retObj = adj.retObj!=null ? Number(adj.retObj) : v.retObj;

  // Leer estimaciones de D si existen
  for(let i=0;i<5;i++){
    if(adj['salesGr'+i]!=null) v.estSalesGr[i] = Number(adj['salesGr'+i]);
    if(adj['ebitMgn'+i]!=null) v.estEbitMgn[i] = Number(adj['ebitMgn'+i]);
  }
  if(adj.taxRate!=null) v.lastTaxRate = Number(adj.taxRate);
  if(adj.ebitdaMgn0!=null){
    v.ebitdaMargin[v.n-1] = Number(adj.ebitdaMgn0);
    v.ebitda[v.n-1] = (v.sales[v.n-1]||0) * v.ebitdaMargin[v.n-1];
  }
  if(adj.lastCapexPct!=null) v.lastCapexPct = Number(adj.lastCapexPct);
  if(adj.lastWcPct!=null) v.lastWcPct = Number(adj.lastWcPct);
  if(adj.lastWc!=null) v.wc[v.n-1] = Number(adj.lastWc);

  // Recalcular estimaciones con los valores actualizados
  let prevSales = v.sales[v.n-1];
  let prevShares = v.shares[v.n-1];
  let prevWc = v.wc[v.n-1]||0;
  for(let i=0;i<5;i++){
    const gr = v.estSalesGr?v.estSalesGr[i]:v.medSalesGr;
    const mgn = v.estEbitMgn?v.estEbitMgn[i]:v.lastEbitMargin;
    const s = prevSales*(1+gr);
    const eb = s * (mgn + v.lastEbitMargin - v.lastEbitMargin); // usa margen
    const ebitdaMarginBase = v.ebitdaMargin[v.n-1] || (v.manualMode ? 0 : 0.4);
    const ebitda_e = s * ebitdaMarginBase;
    const ebit_e = s * mgn;
    const tax = v.lastTaxRate;
    const intE = v.totalInt[v.n-1]||0;
    const ebt_e = ebit_e + intE;
    const ni_e = ebt_e * (1-tax);
    const da_e = ebitda_e - ebit_e;
    const capM = s * v.lastCapexPct;
    const wcE = s * v.lastWcPct;
    const cwcE = wcE - prevWc;
    const fcf_e = ebitda_e - capM + intE - ebt_e*tax - cwcE;
    const shrE = prevShares * (1 + (v.lastSharesGr||(-0.01)));

    v.estSales[i]=s; v.estEbitda[i]=ebitda_e; v.estEbit[i]=ebit_e;
    v.estNi[i]=ni_e; v.estFcf[i]=fcf_e; v.estShares[i]=shrE;
    v.estEps[i]=shrE?ni_e/shrE:0;
    const dnE = (adj.dnEbitda!=null?Number(adj.dnEbitda):v.lastDnEbitda) * ebitda_e;
    v.estDn[i]=dnE;
    prevSales=s; prevShares=shrE; prevWc=wcE;
  }

  // Recalcular precios objetivo
  for(let i=0;i<5;i++){
    const dn=v.estDn[i], shr=v.estShares[i];
    v.precioObj.perExCash[i] = dn<0?(v.estNi[i]*v.objPer-dn)/shr:(v.estNi[i]*v.objPer)/shr;
    v.precioObj.evFcf[i] = (v.estFcf[i]*v.objEvFcf-dn)/shr;
    v.precioObj.evEbitda[i] = (v.estEbitda[i]*v.objEvEbitda-dn)/shr;
    v.precioObj.evEbit[i] = (v.estEbit[i]*v.objEvEbit-dn)/shr;
    const validMethods = [v.precioObj.perExCash[i], v.precioObj.evFcf[i], v.precioObj.evEbitda[i], v.precioObj.evEbit[i]].filter(x => x > 0 && isFinite(x));
    v.precioObj.prom[i] = validMethods.length ? validMethods.reduce((a,b)=>a+b,0) / validMethods.length : 0;
  }
  const p = v.price; // siempre cotización actual FMP; B19 importado no recalcula valoración
  v.cagr5.per = p>0?Math.pow(v.precioObj.perExCash[4]/p,1/5)-1:0;
  v.cagr5.fcf = p>0?Math.pow(v.precioObj.evFcf[4]/p,1/5)-1:0;
  v.cagr5.ebitda = p>0?Math.pow(v.precioObj.evEbitda[4]/p,1/5)-1:0;
  v.cagr5.ebit = p>0?Math.pow(v.precioObj.evEbit[4]/p,1/5)-1:0;
  v.cagr5.prom = p>0?Math.pow(v.precioObj.prom[4]/p,1/5)-1:0;
  v.margenSeg = v.precioObj.evFcf.map(x=>p>0?x/p-1:0);
  v.precioCompra15 = v.precioObj.evFcf[4]>0?v.precioObj.evFcf[4]/Math.pow(1+v.retObj,5):0;
  v.difVsActual = p>0?(v.precioCompra15-p)/p:0;
  const ms5=v.margenSeg[4]||0;
  if(ms5>=0.50){v.signal='buy';v.signalText='COMPRAR';}
  else if(ms5>=0.15){v.signal='hold';v.signalText='MANTENER';}
  else{v.signal='sell';v.signalText='ESPERAR';}

  // Actualizar señal en cartera/candidatas
  const item=[...D.c,...D.p].find(e=>e.tk===v.ticker);
  if(item){item.sig=v.signal;save();}

  renderValoracionIDC(v, window._valEl, window._valBackTo);
  setTimeout(()=>{ valTab('obj'); updateRecalcButtonState(); },50);
  toast('Recalculado');
}

function setValuationPending(isPending=true){
  if(window._valData) window._valData.pendingRecalc = isPending;
  updateRecalcButtonState();
}
function updateRecalcButtonState(){
  const btn = document.getElementById('valRecalcBtn');
  if(!btn) return;
  const pending = !!(window._valData && window._valData.pendingRecalc);
  btn.classList.toggle('pending', pending);
  btn.textContent = pending ? 'Cambios pendientes de recalcular' : '🔄 Recalcular';
}

function updateD(ticker, key, val, fmt){
  const stored = readValStore(ticker);
  if(!stored.adjust) stored.adjust={};
  if(val===''||val==null){
    delete stored.adjust[key];
  } else {
    let raw = String(val).trim().replace('%','').replace(/\s/g,'').replace(',', '.');
    let num = parseFloat(raw);
    // Si es porcentaje y el usuario escribe/renderiza 13 o 13,00 (no 0.13), convertir
    if(fmt==='pct' && Math.abs(num)>=1) num = num/100;
    stored.adjust[key] = num;
  }
  writeValStore(ticker, stored);
  setValuationPending(true);
}

async function handleExcelUpload(event){
  const file = event.target.files[0];
  if(!file) return;
  if(!window._valData){toast('Primero abre una valoración');return;}
  const tk = window._valData.ticker;

  toast('Leyendo Excel...');
  try {
    const data = await file.arrayBuffer();
    // Cargar SheetJS si no está disponible
    if(typeof XLSX==='undefined'){
      await new Promise((res,rej)=>{
        const s=document.createElement('script');
        s.src='https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js';
        s.onload=res;s.onerror=()=>rej(new Error('No se pudo cargar SheetJS'));
        document.head.appendChild(s);
      });
    }
    const wb = XLSX.read(data, {type:'array'});

  // Mapa de celdas a extraer
  const cellMap = {
    // 4.Valoracion
    price: {sheet:'4.Valoracion', cell:'B19'},
    dnEbitda: {sheet:'4.Valoracion', cell:'L5'},
    retObj: {sheet:'4.Valoracion', cell:'B51'},
    objPer: {sheet:'4.Valoracion', cell:'B22'},
    objEvFcf: {sheet:'4.Valoracion', cell:'B23'},
    objEvEbitda: {sheet:'4.Valoracion', cell:'B24'},
    objEvEbit: {sheet:'4.Valoracion', cell:'B25'},
    // 1.IS - Crecimiento ventas
    salesGr0: {sheet:'1.IS', cell:'L4'},
    salesGr1: {sheet:'1.IS', cell:'M4'},
    salesGr2: {sheet:'1.IS', cell:'N4'},
    salesGr3: {sheet:'1.IS', cell:'O4'},
    salesGr4: {sheet:'1.IS', cell:'P4'},
    // 1.IS - Margen EBIT
    ebitMgn0: {sheet:'1.IS', cell:'L10'},
    ebitMgn1: {sheet:'1.IS', cell:'M10'},
    ebitMgn2: {sheet:'1.IS', cell:'N10'},
    ebitMgn3: {sheet:'1.IS', cell:'O10'},
    ebitMgn4: {sheet:'1.IS', cell:'P10'},
    // 1.IS - Tax rate
    taxRate: {sheet:'1.IS', cell:'L17'},
    // Datos reales para modo manual
    ebitdaMgn0: {sheet:'1.IS', cell:'K6'},
    lastCapexPct: {sheet:'2.FCF', cell:'K22'},
    lastWcPct: {sheet:'2.FCF', cell:'K23'},
    lastWc: {sheet:'2.FCF', cell:'K11'},
    // Último año real
    lastSales: {sheet:'1.IS', cell:'K3'},
    lastEbit: {sheet:'1.IS', cell:'K9'},
    lastAR: {sheet:'2.FCF', cell:'K8'},
    lastAP: {sheet:'2.FCF', cell:'K9'},
    lastCash: {sheet:'3.ROIC', cell:'K4'},
    lastMktSec: {sheet:'3.ROIC', cell:'K5'},
    lastLtDebt: {sheet:'3.ROIC', cell:'K7'},
    lastShares: {sheet:'1.IS', cell:'K25'},
  };

  const cleanExcelVal = val => Math.round(Number(val) * 10000) / 10000;
  const stored = readValStore(tk);
  stored.excel = {};
  if(!stored.adjust) stored.adjust = {};

  let count = 0;
  for(const [key, loc] of Object.entries(cellMap)){
    const ws = wb.Sheets[loc.sheet];
    if(!ws) continue;
    const cellObj = ws[loc.cell];
    if(cellObj && cellObj.v!=null){
      const val = Number(cellObj.v);
      if(!isNaN(val)){
        const cleanVal = cleanExcelVal(val);
        stored.excel[key] = cleanVal;
        stored.adjust[key] = cleanVal;
        count++;
      }
    }
  }

  writeValStore(tk, stored);
  toast(`✅ Excel leído: ${count} datos extraídos`);

  // Recalcular y re-renderizar
  if(window._valData && window._valData.manualMode){
    window._valData = createManualValuation(tk, window._valData.fmpError);
    renderValoracionIDC(window._valData, window._valEl, window._valBackTo);
  }
  recalcObj();
  setTimeout(()=>valTab('mult'),100);
  } catch(err) {
    toast('❌ Error leyendo Excel: '+err.message);
    console.error('Excel upload error:', err);
  }
  // Reset file input para permitir re-subir
  event.target.value = '';
}

let chartEvFcf=null, chartIntrinsic=null;
function renderCharts(v){
  // Destruir anteriores
  if(chartEvFcf){chartEvFcf.destroy();chartEvFcf=null;}
  if(chartIntrinsic){chartIntrinsic.destroy();chartIntrinsic=null;}

  const c1 = document.getElementById('ch-evfcf');
  const c2 = document.getElementById('ch-intrinsic');
  if(!c1||!c2) return;

  // Gráfico 1: EV/FCF histórico con mediana
  const evfcfData = v.evFcf.map(x=>x&&isFinite(x)?x:null);
  chartEvFcf = new Chart(c1, {
    type:'bar',
    data:{
      labels:v.years.map(String),
      datasets:[
        {label:'EV/FCF',data:evfcfData,backgroundColor:'rgba(20,46,76,.7)',borderRadius:4},
        {label:'Mediana',data:Array(v.n).fill(v.medEvFcf),type:'line',borderColor:'#d4621a',borderWidth:2,borderDash:[6,3],pointRadius:0,fill:false}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'DM Sans'}}}},scales:{y:{beginAtZero:true,ticks:{font:{size:10}}},x:{ticks:{font:{size:10}}}}}
  });

  // Gráfico 2: Valor intrínseco proyectado
  const allYears = [...v.years.map(String), ...v.estYears];
  const histPrice = Array(v.n).fill(null);
  const projPrice = [...Array(v.n).fill(null), ...v.precioObj.prom];
  const actualLine = Array(allYears.length).fill(v.price);
  chartIntrinsic = new Chart(c2, {
    type:'line',
    data:{
      labels: allYears,
      datasets:[
        {label:'Precio obj. promedio',data:projPrice,borderColor:'#0d9448',backgroundColor:'rgba(13,148,72,.1)',borderWidth:3,fill:true,tension:.3,pointRadius:4},
        {label:'Precio actual',data:actualLine,borderColor:'#d4621a',borderWidth:2,borderDash:[6,3],pointRadius:0,fill:false}
      ]
    },
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:11,family:'DM Sans'}}}},scales:{y:{ticks:{font:{size:10}}},x:{ticks:{font:{size:10}}}}}
  });
}
