// ═══ INICIAR VALORACIÓN ═══
async function startValoracion(tk, backTo){
  const el = document.getElementById('v-valoracion');
  el.innerHTML = `<div class="loader-wrap"><div class="loader"></div><div class="loader-txt">Analizando ${tk}...<br>Descargando datos de FMP</div></div>`;
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  el.classList.add('on');

  try {
    const data = await fetchAllFmpData(tk);
    if(!data.is || !data.is.length) throw new Error('Sin datos financieros');
    const v = calcIDC(data);

    // Recomendación backend/Claude: si falla, se conserva valoración IDC local y se avisa sin exponer claves.
    try {
      const rec = await fetchBackendRecommendation(tk);
      if(rec && rec.recomendacion){
        v.backendRecommendation = rec;
        if(rec.recomendacion==='comprar') v.signal='buy';
        else if(rec.recomendacion==='mantener') v.signal='hold';
        else if(rec.recomendacion==='vender') v.signal='sell';
      }
    } catch(recErr){
      console.warn('Recomendación backend no disponible:', recErr.message);
    }

    const item = [...D.c,...D.p].find(e=>e.tk===tk);
    if(item){ item.sig = v.signal; save(); }

    renderValoracionIDC(v, el, backTo);
    recalcObj();
  } catch(err) {
    const isFmpPlanUnavailable = err.status === 422 || String(err.message||'').toLowerCase().includes('no disponible en tu plan');
    if(isFmpPlanUnavailable){
      console.warn('FMP no disponible, modo manual:', err.message);
      const v = createManualValuation(tk, err.message);
      renderValoracionIDC(v, el, backTo);
      recalcObj();
      return;
    }
    let msg = 'Error al obtener datos';
    if(String(err.message||'').includes('403') || String(err.message||'').includes('401') || err.status===401 || err.status===403) msg='Backend sin permisos o clave inválida';
    else if(String(err.message||'').includes('429') || err.status===429) msg='Límite de peticiones alcanzado';
    else if(String(err.message||'').includes('Sin datos')) msg=`${tk}: sin datos financieros en FMP (¿empresa no-US?)`;
    else if(String(err.message||'').includes('Failed to fetch') || String(err.message||'').includes('NetworkError')) msg='Backend no disponible o error de red';
    el.innerHTML=`<button class="det-back" onclick="go('${backTo}')">← Volver</button><div class="card" style="text-align:center;padding:40px 20px"><div style="font-size:40px;margin-bottom:12px">⚠️</div><div style="font-size:17px;font-weight:800;color:var(--red);margin-bottom:8px">${msg}</div><div style="font-size:13px;color:var(--ink3)">${err.message}</div></div>`;
  }
}

/* ════════════════════════════════════════════════
   OPCIONES — Call cubierta manual
   ════════════════════════════════════════════════ */
const OPTIONS_PERMISSION_CONFIG = {
  allowedStrategy: 'covered_call',
  contractMultiplier: 100,
  allowedMarkets: ['NASDAQ','NYSE','AMEX','ARCA','TSE','TSX','TSXV'],
  permissionLevel: 'IBKR Nivel 1'
};
const OPTIONS_STATUS_LABELS = { open:'Abierta', assigned:'Asignada', expired:'Expirada', bought_back:'Recomprada' };
const OPTIONS_CHAIN_STATE = { ticker:'', loading:false, error:'', chain:null, expiration:'' };
const BLOCKED_OPTION_STRATEGIES = {
  protective_put: 'Bloqueada: el permiso actual de IBKR Nivel 1 de Loren no permite puts protectoras.',
  spread: 'Bloqueada: el permiso actual de IBKR Nivel 1 de Loren no permite spreads.',
  naked_call: 'Bloqueada: el permiso actual de IBKR Nivel 1 de Loren no permite ventas descubiertas.'
};
function loadCoveredCalls(){
  try {
    const parsed = JSON.parse(localStorage.getItem('coveredCalls') || '[]');
    return Array.isArray(parsed) ? parsed : [];
  } catch(e){ return []; }
}
function saveCoveredCalls(calls){ localStorage.setItem('coveredCalls', JSON.stringify(calls || [])); }
function optionTicker(value){ return String(value||'').trim().toUpperCase(); }
function portfolioPosition(ticker){ const tk=optionTicker(ticker); return (D.c||[]).find(e=>optionTicker(e.tk)===tk) || null; }
function isAllowedOptionsMarket(position){ return OPTIONS_PERMISSION_CONFIG.allowedMarkets.includes(String(position?.ex||'').toUpperCase()); }
function maxCoveredCallContracts(position){ return Math.floor((Number(position?.qty)||0) / OPTIONS_PERMISSION_CONFIG.contractMultiplier); }
function optionCurrency(position){ return String(position?.cur || 'USD').toUpperCase(); }
function optionEur(n, cur){ if(n==null || n==='' || !isFinite(Number(n))) return null; return toEur(Number(n), cur); }
function optionDateDiffDays(expiration){
  const exp = new Date(String(expiration||'')+'T00:00:00');
  if(isNaN(exp.getTime())) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  return Math.ceil((exp - now) / 86400000);
}
function optionMoney(value, digits=2){ return value==null || !isFinite(value) ? 'no disponible' : `${f(value,digits)}€`; }
function optionPct(value){ return value==null || !isFinite(value) ? 'no disponible' : `${(value>=0?'+':'')}${f(value*100,2)}%`; }
function optionNumber(value, digits=2){ return value==null || !isFinite(Number(value)) ? 'no disponible' : f(Number(value), digits); }
function optionNative(value, cur, digits=2){ return value==null || !isFinite(Number(value)) ? 'no disponible' : `${f(Number(value), digits)} ${cur || ''}`.trim(); }
function optionInput(id){ return (document.getElementById(id)?.value || '').trim(); }
function escHtml(value){ return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch])); }
function setInputValue(id, value){
  const el = document.getElementById(id);
  if(el) el.value = value == null ? '' : String(value);
}
function currentOptionMode(){ return document.getElementById('opt-mode-sim')?.classList.contains('on') ? 'simulate' : 'real'; }
function setOptionMode(mode){
  const simulate = mode === 'simulate';
  document.getElementById('opt-mode-sim')?.classList.toggle('on', simulate);
  document.getElementById('opt-mode-real')?.classList.toggle('on', !simulate);
  const panel = document.getElementById('opt-panel');
  if(panel){ panel.classList.toggle('sim', simulate); panel.classList.toggle('real', !simulate); }
  document.getElementById('opt-save-real')?.style.setProperty('display', simulate ? 'none' : 'block');
  document.getElementById('opt-save-sim')?.style.setProperty('display', simulate ? 'block' : 'none');
  updateCoveredCallPreview();
}
function readCoveredCallForm(){
  const commissionText = optionInput('opt-commission');
  const simulatedSharesText = optionInput('opt-sim-shares');
  const contractsText = optionInput('opt-contracts');
  return {
    mode: currentOptionMode(),
    strategy: optionInput('opt-strategy') || OPTIONS_PERMISSION_CONFIG.allowedStrategy,
    ticker: optionTicker(optionInput('opt-ticker')),
    contracts: Number(contractsText),
    hasContracts: contractsText !== '',
    simulatedShares: Number(simulatedSharesText),
    hasSimulatedShares: simulatedSharesText !== '',
    expiration: optionInput('opt-expiration'),
    strike: Number(optionInput('opt-strike')),
    premium: Number(optionInput('opt-premium')),
    commission: Number(commissionText),
    hasCommission: commissionText !== '',
    underlyingPrice: Number(optionInput('opt-underlying-price')),
    queryDate: optionInput('opt-query-date'),
    bid: optionInput('opt-bid') === '' ? null : Number(optionInput('opt-bid')),
    ask: optionInput('opt-ask') === '' ? null : Number(optionInput('opt-ask')),
    volume: optionInput('opt-volume') === '' ? null : Number(optionInput('opt-volume')),
    openInterest: optionInput('opt-open-interest') === '' ? null : Number(optionInput('opt-open-interest')),
    impliedVolatility: optionInput('opt-iv') === '' ? null : Number(optionInput('opt-iv')),
    delta: optionInput('opt-delta') === '' ? null : Number(optionInput('opt-delta')),
    notes: optionInput('opt-notes')
  };
}
function validateCoveredCallDraft(draft, position){
  const errors = [];
  const warnings = [];
  if(draft.strategy !== OPTIONS_PERMISSION_CONFIG.allowedStrategy) errors.push(BLOCKED_OPTION_STRATEGIES[draft.strategy] || 'Estrategia bloqueada: solo se permite call cubierta.');
  if(!position) errors.push(`Ticker bloqueado: ${draft.ticker || 'sin ticker'} no está en la cartera actual.`);
  if(draft.mode === 'real' && position && !isAllowedOptionsMarket(position)) errors.push(`${position.tk} cotiza en ${position.ex || 'mercado desconocido'}. El permiso actual solo cubre EE.UU. y Canadá.`);
  if(draft.mode === 'real' && position){
    const max = maxCoveredCallContracts(position);
    if(max < 1) errors.push(`Necesitas al menos ${OPTIONS_PERMISSION_CONFIG.contractMultiplier} acciones de ${position.tk} para vender 1 contrato. Tienes ${Number(position.qty)||0}.`);
    if(Number.isFinite(draft.contracts) && draft.contracts > max) errors.push(`Contratos bloqueados: máximo ${max} para ${position.tk} con ${Number(position.qty)||0} acciones.`);
  }
  if(draft.mode === 'real' && (!draft.hasContracts || !Number.isFinite(draft.contracts) || draft.contracts < 1 || !Number.isInteger(draft.contracts))) errors.push('Introduce un número entero de contratos válido.');
  if(draft.mode === 'simulate' && !draft.hasContracts && !draft.hasSimulatedShares) errors.push('Introduce acciones simuladas o contratos simulados.');
  if(draft.mode === 'simulate' && draft.hasContracts && (!Number.isFinite(draft.contracts) || draft.contracts <= 0)) errors.push('Introduce contratos simulados válidos.');
  if(draft.mode === 'simulate' && draft.hasSimulatedShares && (!Number.isFinite(draft.simulatedShares) || draft.simulatedShares <= 0)) errors.push('Introduce acciones simuladas válidas.');
  if(!draft.expiration) errors.push('Introduce el vencimiento.');
  if(!Number.isFinite(draft.strike) || draft.strike <= 0) errors.push('Introduce un strike válido.');
  if(!Number.isFinite(draft.premium) || draft.premium <= 0) errors.push('Introduce una prima por acción válida.');
  if(!draft.hasCommission || !Number.isFinite(draft.commission) || draft.commission < 0) errors.push('Introduce una comisión válida, aunque sea 0.');
  if(!Number.isFinite(draft.underlyingPrice) || draft.underlyingPrice <= 0) errors.push('Introduce el precio actual del subyacente.');
  if(!draft.queryDate) errors.push('Introduce la fecha de consulta.');
  if(draft.mode === 'real' && position && !isAllowedOptionsMarket(position)) warnings.push('Este aviso está centralizado en OPTIONS_PERMISSION_CONFIG.allowedMarkets para poder cambiarlo si IBKR amplía permisos.');
  return { errors, warnings };
}
function calculateCoveredCall(draft, position){
  if(!position) return {};
  const cur = optionCurrency(position);
  const shares = draft.mode === 'simulate' && draft.hasSimulatedShares ? draft.simulatedShares : OPTIONS_PERMISSION_CONFIG.contractMultiplier * draft.contracts;
  const contractsEquivalent = shares / OPTIONS_PERMISSION_CONFIG.contractMultiplier;
  const grossNative = draft.premium * shares;
  const grossEur = optionEur(grossNative, cur);
  const netEur = grossEur == null ? null : grossEur - draft.commission;
  const netPerShareEur = netEur == null ? null : netEur / shares;
  const commissionNative = draft.commission * getFx(cur);
  const netPerShareNative = (grossNative - commissionNative) / shares;
  const assignedPrice = draft.strike + netPerShareNative;
  const breakEven = Number(position.avg) - netPerShareNative;
  const capitalCoveredEur = optionEur(draft.underlyingPrice * shares, cur);
  const simpleReturn = netEur != null && capitalCoveredEur > 0 ? netEur / capitalCoveredEur : null;
  const days = optionDateDiffDays(draft.expiration);
  const annualizedReturn = simpleReturn != null && days > 0 ? simpleReturn * 365 / days : null;
  const upsideNative = draft.strike - draft.underlyingPrice;
  const upsidePct = draft.underlyingPrice > 0 ? upsideNative / draft.underlyingPrice : null;
  return { cur, shares, contractsEquivalent, grossEur, netEur, netPerShareEur, netPerShareNative, assignedPrice, breakEven, capitalCoveredEur, simpleReturn, annualizedReturn, days, upsideNative, upsidePct };
}
function simulationWarnings(draft, position, calc){
  if(draft.mode !== 'simulate' || !position) return [];
  const warnings = [];
  const realMax = maxCoveredCallContracts(position);
  if(draft.hasSimulatedShares && draft.hasContracts && Math.abs((draft.contracts * OPTIONS_PERMISSION_CONFIG.contractMultiplier) - draft.simulatedShares) > 0.0001){
    warnings.push(`SIMULACIÓN: has indicado acciones y contratos no equivalentes. La calculadora usa ${f(calc.shares,2)} acciones y muestra ${f(calc.contractsEquivalent,2)} contratos equivalentes.`);
  }
  if(realMax < 1 || calc.contractsEquivalent < 1){
    warnings.push(`⚠️ SIMULACIÓN. Con ${f(calc.shares,2)} acciones de ${position.tk} NO puedes vender una call cubierta real: IBKR exige contratos de ${OPTIONS_PERMISSION_CONFIG.contractMultiplier} acciones (tendrías ${f(calc.contractsEquivalent,2)} contratos). Estos números son solo para entender el mecanismo.`);
  }
  if(!isAllowedOptionsMarket(position)){
    warnings.push(`⚠️ SIMULACIÓN. ${position.tk} cotiza en ${position.ex || 'mercado desconocido'} y tu Nivel 1 solo cubre EE.UU. y Canadá.`);
  }
  if(!warnings.length) warnings.push('SIMULACIÓN operable en tamaño y mercado, pero no se guardará como operación real.');
  return warnings;
}
function coveredCallResultsHtml(calc){
  const result = (label, value, cls='') => `<div class="opt-result"><div class="opt-result-l">${label}</div><div class="opt-result-v ${cls}">${value}</div></div>`;
  return `<div class="opt-results">
    ${result('Prima bruta', optionMoney(calc.grossEur))}
    ${result('Prima neta', optionMoney(calc.netEur), 'up')}
    ${result('Prima neta / acción', calc.netPerShareEur==null?'no disponible':`${optionMoney(calc.netPerShareEur)} · ${f(calc.netPerShareNative,4)} ${calc.cur}`)}
    ${result('Precio efectivo si asignan', calc.assignedPrice==null?'no disponible':`${f(calc.assignedPrice,2)} ${calc.cur}`)}
    ${result('Break-even bajista', calc.breakEven==null?'no disponible':`${f(calc.breakEven,2)} ${calc.cur}`)}
    ${result('Rentabilidad simple', optionPct(calc.simpleReturn), 'up')}
    ${result('Rentabilidad anualizada', optionPct(calc.annualizedReturn), 'up')}
    ${result('Upside hasta strike', calc.upsideNative==null?'no disponible':`${f(calc.upsideNative,2)} ${calc.cur} · ${optionPct(calc.upsidePct)}`, calc.upsideNative>=0?'up':'dn')}
    ${result('Upside sacrificado', 'Todo lo que suba por encima del strike si asignan', 'warn')}
    ${result('Días a vencimiento', calc.days==null?'no disponible':String(calc.days))}
    ${result('Contratos equivalentes', calc.contractsEquivalent==null?'no disponible':f(calc.contractsEquivalent,2))}
  </div>`;
}
function updateCoveredCallPreview(){
  const box = document.getElementById('opt-preview');
  if(!box) return;
  const draft = readCoveredCallForm();
  const position = portfolioPosition(draft.ticker);
  const validation = validateCoveredCallDraft(draft, position);
  const calc = validation.errors.length ? {} : calculateCoveredCall(draft, position);
  const simWarnings = validation.errors.length ? [] : simulationWarnings(draft, position, calc);
  const msgs = [
    ...validation.errors.map(e=>`<div class="opt-msg err">${e}</div>`),
    ...validation.warnings.map(w=>`<div class="opt-msg warn">${w}</div>`),
    ...simWarnings.map(w=>`<div class="opt-msg warn">${w}</div>`)
  ].join('');
  box.innerHTML = msgs + (validation.errors.length ? '' : coveredCallResultsHtml(calc));
}
function saveCoveredCallFromForm(simulated=false){
  const draft = readCoveredCallForm();
  if(simulated) draft.mode = 'simulate';
  if(!simulated && draft.mode !== 'real'){ toast('Cambia a Registrar para guardar una operación real'); return; }
  const position = portfolioPosition(draft.ticker);
  const validation = validateCoveredCallDraft(draft, position);
  if(validation.errors.length){ toast('❌ '+validation.errors[0]); updateCoveredCallPreview(); return; }
  const calc = calculateCoveredCall(draft, position);
  const record = {
    id: 'cc_'+Date.now(),
    strategy: OPTIONS_PERMISSION_CONFIG.allowedStrategy,
    status: simulated ? 'simulation' : 'open',
    simulated,
    ticker: position.tk,
    market: position.ex || '',
    currency: calc.cur,
    contracts: simulated ? calc.contractsEquivalent : draft.contracts,
    simulatedShares: simulated ? calc.shares : null,
    multiplier: OPTIONS_PERMISSION_CONFIG.contractMultiplier,
    expiration: draft.expiration,
    strike: draft.strike,
    premium: draft.premium,
    commission: draft.commission,
    underlyingPrice: draft.underlyingPrice,
    queryDate: draft.queryDate,
    bid: draft.bid,
    ask: draft.ask,
    volume: draft.volume,
    openInterest: draft.openInterest,
    impliedVolatility: draft.impliedVolatility,
    delta: draft.delta,
    notes: draft.notes,
    calculations: calc,
    createdAt: new Date().toISOString(),
    updatedAt: new Date().toISOString()
  };
  const calls = loadCoveredCalls();
  calls.unshift(record);
  saveCoveredCalls(calls);
  rOpciones();
  toast(simulated ? '✅ Simulación guardada' : '✅ Call cubierta registrada');
}
function setCoveredCallStatus(id, status){
  const calls = loadCoveredCalls();
  const item = calls.find(c=>c.id===id);
  if(!item) return;
  item.status = status;
  item.updatedAt = new Date().toISOString();
  saveCoveredCalls(calls);
  rOpciones();
  toast(`Estado actualizado: ${OPTIONS_STATUS_LABELS[status] || status}`);

async function fetchOptionsChainFromCboe(){

  OPTIONS_CHAIN_STATE.expiration = expiration;

  OPTIONS_CHAIN_STATE.error = '';

  try {

    const data = await backendFetch(`/api/options/chain/${encodeURIComponent(ticker)}${q}`, { headers });

function calculateCoveredCallPartial(draft, position){
  if(!position) return {};
  const cur = optionCurrency(position);
  const shares = draft.hasSimulatedShares && Number.isFinite(draft.simulatedShares) && draft.simulatedShares > 0 ? draft.simulatedShares : (draft.hasContracts && Number.isFinite(draft.contracts) && draft.contracts > 0 ? draft.contracts * OPTIONS_PERMISSION_CONFIG.contractMultiplier : Number(position.qty || 0));
  const grossNative = Number.isFinite(draft.premium) && shares > 0 ? draft.premium * shares : null;
  const grossEur = grossNative == null ? null : optionEur(grossNative, cur);
  const commissionOk = draft.hasCommission && Number.isFinite(draft.commission) && draft.commission >= 0;
  const netEur = grossEur != null && commissionOk ? grossEur - draft.commission : null;
  const commissionNative = commissionOk ? draft.commission * getFx(cur) : null;
  const netPerShareNative = grossNative != null && commissionNative != null && shares > 0 ? (grossNative - commissionNative) / shares : null;
  const netPerShareEur = netEur != null && shares > 0 ? netEur / shares : null;
  const assignedPrice = netPerShareNative != null && Number.isFinite(draft.strike) ? draft.strike + netPerShareNative : null;
  const breakEven = netPerShareNative != null && Number.isFinite(Number(position.avg)) ? Number(position.avg) - netPerShareNative : null;
  const capitalCoveredEur = Number.isFinite(draft.underlyingPrice) && shares > 0 ? optionEur(draft.underlyingPrice * shares, cur) : null;
  const simpleReturn = netEur != null && capitalCoveredEur > 0 ? netEur / capitalCoveredEur : null;
  const days = optionDateDiffDays(draft.expiration);
  const annualizedReturn = simpleReturn != null && days > 0 ? simpleReturn * 365 / days : null;
  const upsideNative = Number.isFinite(draft.strike) && Number.isFinite(draft.underlyingPrice) ? draft.strike - draft.underlyingPrice : null;
  const upsidePct = upsideNative != null && draft.underlyingPrice > 0 ? upsideNative / draft.underlyingPrice : null;
  return { cur, shares, grossNative, grossEur, netEur, netPerShareNative, netPerShareEur, assignedPrice, breakEven, capitalCoveredEur, simpleReturn, annualizedReturn, days, upsideNative, upsidePct };
}
function classifyMoneyness(row, underlyingPrice){
  if(!Number.isFinite(row?.strike) || !Number.isFinite(underlyingPrice) || underlyingPrice <= 0) return { label:'no disponible', distance:null };
  const distance = (row.strike - underlyingPrice) / underlyingPrice;
  const label = Math.abs(distance) <= 0.01 ? 'ATM' : (distance > 0 ? 'OTM' : 'ITM');
  return { label, distance };
}
function ivContext(row){
  const values = chainCallsForCurrentExpiration().map(item=>item.impliedVolatility).filter(v=>Number.isFinite(v) && v > 0).sort((a,b)=>a-b);
  if(!Number.isFinite(row?.impliedVolatility) || row.impliedVolatility <= 0 || values.length < 3) return { label:'no disponible', percentile:null };
  const below = values.filter(v=>v < row.impliedVolatility).length;
  const percentile = values.length > 1 ? below / (values.length - 1) : null;
  const label = percentile == null ? 'no disponible' : (percentile >= 0.66 ? 'alta frente a esta cadena' : (percentile <= 0.33 ? 'baja frente a esta cadena' : 'media frente a esta cadena'));
  return { label, percentile };
}
function liquidityContext(row){
  const bid = Number(row?.bid);
  const ask = Number(row?.ask);
  const mid = Number.isFinite(bid) && Number.isFinite(ask) ? (bid + ask) / 2 : null;
  const spread = Number.isFinite(bid) && Number.isFinite(ask) ? ask - bid : null;
  const spreadPct = spread != null && mid > 0 ? spread / mid : null;
  const volume = Number(row?.volume);
  const oi = Number(row?.openInterest);
  const risks = [];
  if(spreadPct != null && spreadPct > 0.10) risks.push(`Spread ancho: bid/ask separados un ${f(spreadPct*100,2)}% del punto medio.`);
  if(Number.isFinite(volume) && volume < 10) risks.push(`Volumen bajo: ${f(volume,0)} contratos.`);
  if(Number.isFinite(oi) && oi < 50) risks.push(`Interés abierto bajo: ${f(oi,0)} contratos.`);
  if(Number.isFinite(volume) && Number.isFinite(oi) && volume === 0 && oi === 0) risks.push('Contrato muerto: volumen e interés abierto a 0.');
  return { spread, spreadPct, volume: Number.isFinite(volume) ? volume : null, openInterest: Number.isFinite(oi) ? oi : null, risks };
}

  const row = (OPTIONS_CHAIN_STATE.chain?.calls || []).find(item => item.contractSymbol === contractSymbol);

let _toastTimer=null;

  const t=document.getElementById('toast');

  t.style.transform='translateX(-50%) translateY(0)';
  t.style.opacity='1';
  t.style.visibility='visible';
  if(_toastTimer){clearTimeout(_toastTimer);_toastTimer=null;}
  _toastTimer=setTimeout(function(){
    t.style.transform='translateX(-50%) translateY(50px)';
    t.style.opacity='0';
    setTimeout(function(){t.style.visibility='hidden';},350);

async function refreshFxRates(){
 try{
   const [eurusdData, gbpusdData, usdcadData] = await Promise.all([
     fmpFetch('quote', 'EURUSD'),
     fmpFetch('quote', 'GBPUSD'),
     fmpFetch('quote', 'USDCAD'),

   const eurusd = Number((Array.isArray(eurusdData) ? eurusdData[0] : eurusdData)?.price || 0);

function parseClaudeJsonResponse(responseText){
  const raw = String(responseText || '').trim();
  if(!raw) throw new Error('Claude devolvió una respuesta vacía');

  const clean = raw.replace(/```json|```/gi, '').trim();

  try {
    return JSON.parse(clean);
  } catch(_) {
    const match = clean.match(/\{[\s\S]*\}|\[[\s\S]*\]/);
    if(match){
      try {
        return JSON.parse(match[0]);
      } catch(_) {}
    }
  }

  throw new Error('Claude no devolvió JSON válido');
}

function fileToBase64(file){
  return new Promise((res,rej)=>{
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('Error leyendo archivo'));
    r.readAsDataURL(file);
  });
}

/* ════════════════════════════════════════════════
   SUBIR DOCUMENTACIÓN BROKER (Config)
   ════════════════════════════════════════════════ */
async function handleBrokerUpload(event){
  const files = Array.from(event.target.files || []);
  if(!files.length) return;

  const zone = document.getElementById('broker-upload-zone');
  zone.classList.add('processing');
  zone.querySelector('input').disabled = true;
  const origText = zone.childNodes[0].textContent;
  const results = [];
  let mergedTariffs = { ...(getBrokerTariffs() || {}) };

  for(let index = 0; index < files.length; index++){
    const file = files[index];
    zone.childNodes[0].textContent = `⏳ Analizando documento ${index + 1} de ${files.length}...`;

    try {
      validateBrokerTariffFile(file);
      const formData = new FormData();
      formData.append('file', file);
      const result = await backendFormFetch('/api/broker/tariffs', formData);
      mergedTariffs = { ...mergedTariffs, ...(result.tariffs || {}) };
      results.push({ file: file.name, ok: true, message: 'OK' });
    } catch(err){
      console.error('Broker upload error:', file.name, err);
      results.push({ file: file.name, ok: false, message: err.message || 'Error analizando documento' });
    }
  }

  if(Object.keys(mergedTariffs).length) setBrokerTariffs(mergedTariffs);
  renderBrokerUploadResults(results);
  zone.classList.remove('processing');
  zone.childNodes[0].textContent = origText;
  zone.querySelector('input').disabled = false;
  event.target.value = '';

  const okCount = results.filter(r => r.ok).length;
  if(okCount) toast(`✅ ${okCount} documento(s) de tarifas procesados`);
  if(okCount !== results.length) toast(`⚠️ ${results.length - okCount} documento(s) con error`);
  rConfig();
  renderBrokerUploadResults(results);
}

function validateBrokerTariffFile(file){
  const allowed = ['application/pdf', 'image/jpeg', 'image/png'];
  if(!allowed.includes(file.type)) throw new Error('Tipo no permitido. Sube PDF, JPG o PNG.');
  if(file.size > 20 * 1024 * 1024) throw new Error('El archivo supera el límite de 20 MB.');
}

function renderBrokerUploadResults(results){
  const zone = document.getElementById('broker-upload-zone');
  if(!zone || !results.length) return;
  const html = results.map((r, index) => `<div style="font-size:12px;margin-top:6px;color:${r.ok?'var(--green)':'var(--red)'}"><b>${index + 1}. ${r.file}</b>: ${r.ok?'procesado':r.message}</div>`).join('');
  zone.insertAdjacentHTML('afterend', `<div class="broker-status ${results.every(r=>r.ok)?'ok':'empty'}" style="display:block">${html}</div>`);
}

El valor comision_eur debe ser un número en euros. Si el importe está en otra divisa, conviértelo a EUR aproximadamente.
Si no encuentras comisión clara, pon {"comision_eur": 0, "detalle": "No se pudo detectar comisión"}.`;

  try {

/* ════════════════════════════════════════════════
   LEER CAPTURA COMPLETA DE OPERACIÓN DEL BROKER
   Extrae: fecha, acciones, precio, comisión, divisa
   ════════════════════════════════════════════════ */
async function readTradeCapture(event, tk, targetPrefix){
  const file = event.target.files[0];
  if(!file) return;

  const btn = document.getElementById(
    targetPrefix==='buy' ? 'buy-trade-btn' : targetPrefix+'-attach-btn'
  );
  const textEl = document.getElementById(
    targetPrefix==='buy' ? 'buy-trade-text' : targetPrefix+'-attach-text'
  );
  if(btn) { btn.classList.remove('done'); btn.classList.add('reading'); }
  if(textEl) textEl.textContent = '⏳ Leyendo datos de la operación...';

  const TRADE_PROMPT = `Analiza esta imagen/captura de pantalla de una operación de compra o venta de acciones en un broker (probablemente Interactive Brokers).
Extrae TODOS los datos que puedas de la operación.
Responde SOLO con un JSON válido (sin markdown, sin backticks, sin explicaciones):
{
  "tipo": "compra o venta",
  "ticker": "AAPL",
  "fecha": "2026-01-15",
  "num_acciones": 10,
  "precio_unitario": 185.50,
  "divisa": "USD",
  "comision_eur": 1.23,
  "comision_original": "1.50 USD",
  "importe_total_original": 1856.23,
  "tipo_cambio": 1.08,
  "notas": "cualquier dato adicional"
}
Si algún campo no está claro, pon null. comision_eur = comisión en euros. Tipos de cambio aprox: EUR/USD≈1.16, EUR/GBP≈0.87, EUR/CAD≈1.60.`;

  try {
    let response;
    if(file.type.startsWith('image/')){
      const b64 = await fileToBase64(file);
      response = await callClaudeVision(b64, file.type, TRADE_PROMPT);
    } else {
      const text = await file.text();
      response = await callClaudeText(text, TRADE_PROMPT);
    }

    const result = parseClaudeJsonResponse(response);

    if(btn) { btn.classList.remove('reading'); btn.classList.add('done'); }

    let summary = [];
    if(result.fecha) summary.push(result.fecha);
    if(result.num_acciones) summary.push(result.num_acciones+' acc.');
    if(result.precio_unitario) summary.push(result.precio_unitario+' '+(result.divisa||''));
    if(result.comision_eur!=null) summary.push('Com: '+result.comision_eur.toFixed(2)+'€');
    if(textEl) textEl.textContent = '✅ ' + (summary.length ? summary.join(' · ') : 'Datos detectados');

    window._lastTradeCapture = result;

    // Auto-rellenar campos del modal de compra si existen
    const dateEl = document.getElementById(targetPrefix+'-date');
    const qtyEl = document.getElementById(targetPrefix+'-qty');
    const priceEl = document.getElementById(targetPrefix+'-price');
    const commEl = document.getElementById(
      targetPrefix==='buy' ? 'buy-comm' :
      targetPrefix==='addbuy' ? 'addbuy-comm' :
      'sell-comms'
    );
    if(dateEl && result.fecha) dateEl.value = result.fecha;
    if(qtyEl && result.num_acciones) qtyEl.value = result.num_acciones;
    if(priceEl && result.precio_unitario) priceEl.value = result.precio_unitario;
    if(commEl && result.comision_eur!=null) commEl.value = result.comision_eur.toFixed(2);
    // Trigger recalc
    if(qtyEl) qtyEl.dispatchEvent(new Event('input'));

    toast('✅ Datos detectados: ' + summary.join(' · '));
  } catch(err){
    console.error('Trade capture error:', err);
    if(btn) btn.classList.remove('reading');
    if(textEl) textEl.textContent = '📎 Subir captura de la operación';
    toast('❌ Error leyendo: ' + err.message.slice(0,60));
  }
  event.target.value = '';
}

let _buyTk = null;
function openBuyM(tk){
  const item = D.p.find(e=>e.tk===tk);

  ['buy-qty','buy-price','buy-comm'].forEach(id=>{
    document.getElementById(id).oninput = ()=>calcBuyTotal(cur);
  });
  calcBuyTotal(cur);
}
function calcBuyTotal(cur){
  const qty = parseFloat(document.getElementById('buy-qty').value)||0;
  const pr = parseFloat(document.getElementById('buy-price').value)||0;
  const comm = parseFloat(document.getElementById('buy-comm').value)||0;
  const calc = document.getElementById('buy-calc');
  if(qty>0 && pr>0){
    const fx = getFx(cur);
    const costLocal = qty * pr;
    const costEur = toEur(costLocal, cur) + comm;
    document.getElementById('buy-fx').textContent = cur==='EUR' ? '1,00' : fx.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:4});
    document.getElementById('buy-total').textContent = costEur.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2}) + '€';
    calc.style.display = 'flex';
  } else {
    calc.style.display = 'none';
  }
}
function closeBuyM(){
  _buyTk = null;
  document.getElementById('modal-buy').classList.remove('open');
}
function confirmBuy(){
  if(!_buyTk) return;
  const tk = _buyTk;
  const item = D.p.find(e=>e.tk===tk);
  if(!item) return;
  const date = document.getElementById('buy-date').value;
  const qty = parseInt(document.getElementById('buy-qty').value);
  const pr = parseFloat(document.getElementById('buy-price').value);
  const comm = parseFloat(document.getElementById('buy-comm').value)||0;
  if(!date) return alert('Introduce la fecha de compra');
  if(!qty || qty<=0) return alert('Introduce el nº de acciones');
  if(!pr || pr<=0) return alert('Introduce el precio de compra');

  const cur = item.cur || 'USD';
  const costLocal = qty * pr;
  const costEur = toEur(costLocal, cur) + comm; // comisión incluida
  const fx = getFx(cur);

  // Mover de candidatas a cartera con datos reales
  const idx = D.p.findIndex(e=>e.tk===tk);
  if(idx<0) return;
  const [moved] = D.p.splice(idx, 1);
  moved.qty = qty;
  moved.avg = pr;
  moved.cost = roundMoney(costEur);
  moved.val = roundMoney(toEur(qty * (moved.pr||pr), cur));
  moved.pnl = moved.val - moved.cost;
  moved.w = 0;
  moved.divs = 0;
  moved.cur = cur;
  D.c.push(moved);

  // Registrar en BUYS
  if(!BUYS[tk]) BUYS[tk] = [];
  const curSym = cur==='GBP'?'£':cur==='CAD'?'C$':cur==='EUR'?'€':'$';
  BUYS[tk].push({
    d: date,
    q: qty,
    p: curSym + pr.toLocaleString('es-ES',{minimumFractionDigits:2}),
    e: costEur.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0}),
    va: moved.val.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0}),
    pl: (moved.pnl>=0?'+':'')+moved.pnl.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0}),
    pct: (moved.pnl>=0?'+':'')+(moved.cost?((moved.pnl/moved.cost)*100).toFixed(1):'0.0')+'%'
  });

  // Registrar en METRICS
  const m = METRICS[tk];
  if(!m){
    METRICS[tk] = {
      costTotal:costEur, valMerc:moved.val, plNR:moved.pnl,
      rent: moved.cost ? (moved.pnl/moved.cost)*100 : 0,
      pMedio: curSym+pr.toLocaleString('es-ES',{minimumFractionDigits:2}),
      pActual: curSym+(moved.pr||pr).toLocaleString('es-ES',{minimumFractionDigits:2}),
      varP: moved.pr && pr ? ((moved.pr-pr)/pr)*100 : 0,
      nAcc:qty, sector:moved.sec||'—', divisa:cur,
      tcambio:fx.toLocaleString('es-ES',{minimumFractionDigits:2}), curSym
    };
  }

  save();
  closeBuyM();
  updC();
  go(cur=='resumen'?'resumen':cur);
  go('valoracion');
  toast(`✅ ${tk} añadido a Cartera · ${qty} acc. · ${costEur.toLocaleString('es-ES',{maximumFractionDigits:0})}€`);
}

function confirmAddBuy(tk){
  const item = D.c.find(e=>e.tk===tk);
  if(!item) return;
  const date = document.getElementById('addbuy-date').value;
  const qty = parseInt(document.getElementById('addbuy-qty').value);
  const pr = parseFloat(document.getElementById('addbuy-price').value);
  const comm = parseFloat(document.getElementById('addbuy-comm').value)||0;
  if(!date) return alert('Introduce la fecha');
  if(!qty || qty<=0) return alert('Introduce el nº de acciones');
  if(!pr || pr<=0) return alert('Introduce el precio');

  const cur = item.cur || 'USD';
  const costEur = toEur(qty*pr, cur) + comm;
  const curSym = cur==='GBP'?'£':cur==='CAD'?'C$':cur==='EUR'?'€':'$';

  // Actualizar posición
  const oldQty = item.qty;
  const oldCost = item.cost || 0;
  item.qty = oldQty + qty;
  item.cost = roundMoney(oldCost + costEur);
  item.val = roundMoney(toEur(item.qty * (item.pr||pr), cur));
  item.pnl = item.val - item.cost;

  // Registrar en BUYS
  if(!BUYS[tk]) BUYS[tk] = [];
  const valNow = roundMoney(toEur(qty * (item.pr||pr), cur));
  const plBuy = valNow - roundMoney(costEur);
  BUYS[tk].push({
    d: date, q: qty,
    p: curSym + pr.toLocaleString('es-ES',{minimumFractionDigits:2}),
    e: Math.round(costEur).toLocaleString('es-ES'),
    va: valNow.toLocaleString('es-ES'),
    pl: (plBuy>=0?'+':'')+plBuy.toLocaleString('es-ES'),
    pct: (plBuy>=0?'+':'')+(costEur?(plBuy/costEur*100).toFixed(1):'0.0')+'%'
  });

  // Actualizar METRICS
  const m = METRICS[tk];
  if(m){
    m.costTotal = item.cost;
    m.valMerc = item.val;
    m.plNR = item.pnl;
    m.rent = item.cost ? (item.pnl/item.cost)*100 : 0;
    m.nAcc = item.qty;
    // Recalcular precio medio en divisa original
  const totalCostLocal = BUYS[tk].reduce((s,b)=>{
    const pVal = parseFloat((b.p||'0').replace(/[^0-9.,-]/g,'').replace(',','.')) || 0;
    const bq = typeof b.q==='number'?b.q:parseInt(b.q)||0;
    return s + pVal * bq;
  }, 0);
  const avgLocal = item.qty ? totalCostLocal / item.qty : 0;
  item.avg = avgLocal;
  m.pMedio = curSym + avgLocal.toLocaleString('es-ES',{minimumFractionDigits:2});
  }

  save();
  closeExitM();
  updC();
  go('resumen');
  toast(`✅ +${qty} acc. de ${tk} añadidas · Total: ${item.qty} acc.`);
}

  const item = D.c.find(e=>e.tk===tk);
  if(!item) return;
  const qty = parseFloat(document.getElementById('sell-qty').value)||0;
  const pr = parseFloat(document.getElementById('sell-price').value)||0;
  const comms = parseFloat(document.getElementById('sell-comms').value)||0;
  const calc = document.getElementById('sell-calc');
  if(qty>0 && pr>0){
    const grossLocal = qty * pr;
    const grossEur = toEur(grossLocal, cur) - comms;
    // Coste proporcional
    const costProp = item.cost ? (item.cost / item.qty) * qty : 0;
    const pl = grossEur - costProp;
    document.getElementById('sell-gross').textContent = grossEur.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+'€';
    const plEl = document.getElementById('sell-pl');
    plEl.textContent = (pl>=0?'+':'')+pl.toLocaleString('es-ES',{minimumFractionDigits:2,maximumFractionDigits:2})+'€';
    plEl.style.color = pl>=0 ? 'var(--green)' : 'var(--red)';
    calc.style.display = 'flex';
  } else {
    calc.style.display = 'none';
  }
}

function confirmSell(tk, mode){
  const item = D.c.find(e=>e.tk===tk);
  if(!item) return;
  const date = document.getElementById('sell-date').value;
  const qty = parseInt(document.getElementById('sell-qty').value);
  const pr = parseFloat(document.getElementById('sell-price').value);
  const comms = parseFloat(document.getElementById('sell-comms').value)||0;
  if(!date) return alert('Introduce la fecha de venta');
  if(!qty || qty<=0) return alert('Introduce el nº de acciones');
  if(qty > item.qty) return alert(`Solo tienes ${item.qty} acciones`);
  if(!pr || pr<=0) return alert('Introduce el precio de venta');

  const cur = item.cur || 'USD';
  const grossLocal = qty * pr;
  const grossEur = toEur(grossLocal, cur) - comms;
  const costProp = item.cost ? (item.cost / item.qty) * qty : 0;
  const pl = grossEur - costProp;
  const curSym = cur==='GBP'?'£':cur==='CAD'?'C$':cur==='EUR'?'€':'$';

  // Registrar venta en SELLS siempre
  if(!SELLS[tk]) SELLS[tk] = [];
  SELLS[tk].push({
    d: date, q: qty,
    p: curSym + pr.toLocaleString('es-ES',{minimumFractionDigits:2}),
    precio: pr, divisa: cur,
    ingreso_eur: roundMoney(grossEur),
    coste_prop_eur: roundMoney(costProp),
    pl: roundMoney(pl),
    comision: comms,
    tipo: mode==='total' || qty >= item.qty ? 'total' : 'parcial'
  });

  if(mode==='total' || qty >= item.qty){
    // Venta total → mantener datos históricos para informe, marcar como cerrada
    item.qty = 0;
    item.val = 0;
    item.pnl = 0;
    item.closed = true;
    item.closedDate = date;
    item.closedPl = roundMoney(pl);
    // NO borrar BUYS ni METRICS — se necesitan para el informe
    toast(`✅ ${tk} vendido · ${qty} acc. · ${(pl>=0?'+':'')}${pl.toLocaleString('es-ES',{maximumFractionDigits:0})}€`);
    // Mostrar informe automáticamente
    setTimeout(()=>showReport(tk), 500);
  } else {
    // Venta parcial → reducir posición
    const remainQty = item.qty - qty;
    const remainCost = item.cost - costProp;
    item.qty = remainQty;
    item.cost = roundMoney(remainCost);
    item.val = roundMoney(toEur(remainQty * (item.pr||pr), cur));
    item.pnl = item.val - item.cost;
    // Actualizar METRICS
    const m = METRICS[tk];
    if(m){
      m.costTotal = remainCost;
      m.valMerc = item.val;
      m.plNR = item.pnl;
      m.rent = remainCost ? (item.pnl/remainCost)*100 : 0;
      m.nAcc = remainQty;
    }
    // Actualizar BUYS: quitar las acciones vendidas de las compras más antiguas
    if(BUYS[tk]){
      let toRemove = qty;
      const newBuys = [];
      BUYS[tk].forEach(b=>{
        if(toRemove <= 0){ newBuys.push(b); return; }
        const bq = parseInt(b.q);
        if(bq <= toRemove){
          toRemove -= bq; // eliminar esta compra entera
        } else {
          // parcial: reducir qty de esta compra
          const remain = bq - toRemove;
          toRemove = 0;
          newBuys.push({...b, q:remain});
        }
      });
      BUYS[tk] = newBuys;
    }
    toast(`✅ Vendidas ${qty} acc. de ${tk} · Quedan ${remainQty} · P/L ${(pl>=0?'+':'')}${pl.toLocaleString('es-ES',{maximumFractionDigits:0})}€`);
  }

  save();
  closeExitM();
  updC();
  go('resumen');
}

function confirmMove(tk){
  if(!confirm(`¿Mover ${tk} a Candidatas sin registrar venta?`)) return;
  const idx = D.c.findIndex(e=>e.tk===tk);
  if(idx<0) return;
  const [item] = D.c.splice(idx, 1);
  // Limpiar datos de cartera
  delete item.qty; delete item.avg; delete item.cost; delete item.val; delete item.pnl; delete item.w; delete item.divs;
  item.chg = 0; item.pct = 0;
  D.p.push(item);
  save();
  closeExitM();
  updC();
  go('resumen');
  toast(`${tk} → Candidatas`);
}

function confirmDelete(tk){
  if(!confirm(`¿Eliminar ${tk} definitivamente?\n\nSe borrarán todos los datos de esta posición.`)) return;
  const idx = D.c.findIndex(e=>e.tk===tk);
  if(idx>=0) D.c.splice(idx, 1);
  delete METRICS[tk];
  delete BUYS[tk];
  delete DIVS[tk];
  save();
  closeExitM();
  updC();
  go('resumen');
  toast(`🗑️ ${tk} eliminado`);
}

function closeExitM(){
  _exitTk = null;
  document.getElementById('modal-exit').classList.remove('open');
}

/* ════════════════════════════════════════════════
   SUBIR CAPTURA DE COMPRA DESDE GESTIONAR POSICIÓN
   (para posiciones ya existentes o datos olvidados)
   ════════════════════════════════════════════════ */
async function readTradeCaptureFromExit(event, tk){
  const file = event.target.files[0];
  if(!file) return;

  const descEl = document.getElementById('exit-capture-desc');
  if(descEl) descEl.textContent = '⏳ Leyendo captura...';

  const TRADE_PROMPT = `Analiza esta imagen/captura de una operación de compra/venta de acciones en un broker (Interactive Brokers).
Extrae todos los datos. Responde SOLO con JSON válido (sin markdown):
{
  "tipo": "compra o venta",
  "ticker": "AAPL",
  "fecha": "2026-01-15",
  "num_acciones": 10,
  "precio_unitario": 185.50,
  "divisa": "USD",
  "comision_eur": 1.23,
  "comision_original": "1.50 USD",
  "importe_total_original": 1856.23,
  "tipo_cambio": 1.08,
  "notas": "dato adicional"
}
Si no ves un campo, pon null. EUR/USD≈1.16, EUR/GBP≈0.87, EUR/CAD≈1.60.`;

  try {
    let response;
    if(file.type.startsWith('image/')){
      const b64 = await fileToBase64(file);
      response = await callClaudeVision(b64, file.type, TRADE_PROMPT);
    } else {
      const text = await file.text();
      response = await callClaudeText(text, TRADE_PROMPT);
    }
    const result = parseClaudeJsonResponse(response);

    // Actualizar la posición en cartera con los datos detectados
    const item = D.c.find(e=>e.tk===tk);
    if(item && result.num_acciones) {
      const cur = result.divisa || item.cur || 'USD';
      const pr = result.precio_unitario || item.avg || 0;
      const qty = result.num_acciones || item.qty;
      const comm = result.comision_eur || 0;
      const costEur = toEur(qty * pr, cur) + comm;

      // Añadir como nueva compra en BUYS
      if(!BUYS[tk]) BUYS[tk] = [];
      const curSym = cur==='GBP'?'£':cur==='CAD'?'C$':cur==='EUR'?'€':'$';
      const valNow = toEur(qty * (item.pr||pr), cur);
      const plBuy = valNow - costEur;
      BUYS[tk].push({
        d: result.fecha || new Date().toISOString().split('T')[0],
        q: qty,
        p: curSym + pr.toLocaleString('es-ES',{minimumFractionDigits:2}),
        e: costEur.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0}),
        va: valNow.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0}),
        pl: (plBuy>=0?'+':'')+plBuy.toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0}),
        pct: (plBuy>=0?'+':'')+(costEur?(plBuy/costEur*100).toFixed(1):'0.0')+'%'
      });

      save();
      if(descEl) descEl.textContent = '✅ Compra registrada: '+qty+' acc. · '+(result.fecha||'')+ ' · Com: '+comm.toFixed(2)+'€';
      toast(`✅ Compra de ${tk} registrada desde captura`);
    } else {
      if(descEl) descEl.textContent = '⚠️ No se detectaron datos suficientes';
      toast('⚠️ No se pudieron extraer datos de la captura');
    }
  } catch(err){
    console.error('Exit trade capture error:', err);
    if(descEl) descEl.textContent = '❌ Error — inténtalo de nuevo';
    toast('❌ Error: ' + err.message.slice(0,60));
  }
  event.target.value = '';
}

  const totalInvertido = m ? m.costTotal : (item.cost||0);

  const totalDivs = divs.reduce((s,d)=>s+d.neto, 0);
  const totalComms = sells.reduce((s,v)=>s+(v.comision||0), 0);

  const plTotal = (valorActual + totalVendido + totalDivs) - totalInvertido;
  const plPct = totalInvertido ? (plTotal / totalInvertido) * 100 : 0;
  const totalAccCompradas = buys.reduce((s,b)=>s+(typeof b.q==='number'?b.q:parseInt(b.q)||0), 0);

  // Construir timeline

  divs.forEach(d => events.push({type:'div', date:d.d, desc:`Dividendo cobrado`, val:`+${f(d.neto,2)}€ neto`, sort:d.d}));

    const eurVal = parseFloat((b.e||'0').replace(/\./g,'').replace(',','.')) || 0;

    <div style="font-size:18px;font-weight:700;margin-bottom:8px">${item.nm}</div>
    <div class="rpt-big">${sg(plTotal)}${f(plTotal,0)}€</div>

    <div class="rpt-cell"><div class="rpt-cell-l">Total invertido</div><div class="rpt-cell-v">${f(totalInvertido,0)}€</div></div>
    <div class="rpt-cell"><div class="rpt-cell-l">${isClosed?'Total vendido':'Valor actual'}</div><div class="rpt-cell-v">${f(isClosed?totalVendido:valorActual,0)}€</div></div>
    <div class="rpt-cell"><div class="rpt-cell-l">Acciones compradas</div><div class="rpt-cell-v">${totalAccCompradas}</div></div>
    <div class="rpt-cell"><div class="rpt-cell-l">${isClosed?'Acciones vendidas':'En cartera'}</div><div class="rpt-cell-v">${isClosed?totalAccVendidas:item.qty}</div></div>
    <div class="rpt-cell"><div class="rpt-cell-l">Dividendos netos</div><div class="rpt-cell-v ${totalDivs>0?'up':''}">${totalDivs>0?'+':''}${f(totalDivs,2)}€</div></div>
    <div class="rpt-cell"><div class="rpt-cell-l">Comisiones</div><div class="rpt-cell-v dn">${totalComms>0?'-':''}${f(totalComms,2)}€</div></div>`;
  if(!isClosed && m){
    h += `<div class="rpt-cell"><div class="rpt-cell-l">Precio medio</div><div class="rpt-cell-v">${m.pMedio}</div></div>
    <div class="rpt-cell"><div class="rpt-cell-l">Cotización</div><div class="rpt-cell-v ${cls(m.varP)}">${m.pActual}</div></div>`;
  }
  if(sells.length > 0){
    h += `<div class="rpt-cell"><div class="rpt-cell-l">P/L ventas</div><div class="rpt-cell-v ${cls(totalVendido-sells.reduce((s,v)=>s+v.coste_prop_eur,0))}">${sg(totalVendido-sells.reduce((s,v)=>s+v.coste_prop_eur,0))}${f(totalVendido-sells.reduce((s,v)=>s+v.coste_prop_eur,0),0)}€</div></div>

    events.forEach(ev => {

        <div class="rpt-event-date">${ev.date||'—'}</div>
        <div class="rpt-event-desc">${ev.desc}</div>

    h += `</div></div>`;

  // Tabla de compras
  if(buys.length > 0){
    h += `<div class="card" style="overflow-x:auto"><div class="card-t">🛒 Detalle de compras</div>
      <table class="dtbl"><thead><tr><th>Fecha</th><th>Acc.</th><th>Precio</th><th>Coste €</th></tr></thead><tbody>`;
    buys.forEach(b => {
      h += `<tr><td>${b.d||'—'}</td><td>${b.q}</td><td>${b.p}</td><td>${b.e}</td></tr>`;

    h += `<tr class="trow"><td>TOTAL</td><td>${totalAccCompradas}</td><td>—</td><td>${f(totalInvertido,0)}</td></tr></tbody></table></div>`;

      <span style="font-size:18px">📄</span> Descargar PDF / Imprimir

  document.querySelectorAll('.view').forEach(v=>v.classList.remove('on'));
  el.classList.add('on');
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('on',b.dataset.v==='valoracion'));
  window.scrollTo({top:0});

  // Renderizar gráficos
  _rptCharts.forEach(c=>c.destroy());
  _rptCharts = [];
  setTimeout(()=>{
    // Gráfico evolución coste
    const c1 = document.getElementById('rpt-ch-cost');
    if(c1 && costData.length > 0){
      _rptCharts.push(new Chart(c1, {
        type:'line',
        data:{
          labels:costLabels,
          datasets:[{
            label:'Inversión acumulada (€)',
            data:costData,
            borderColor:'#142e4c', backgroundColor:'rgba(20,46,76,.1)',
            borderWidth:3, fill:true, tension:.3, pointRadius:6,
            pointBackgroundColor:'#142e4c', pointBorderColor:'#fff', pointBorderWidth:2
          }]
        },
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
          scales:{y:{beginAtZero:true,ticks:{font:{size:10},callback:v=>v.toLocaleString('es-ES')+'€'}},x:{ticks:{font:{size:10}}}}}
      }));
    }
    // Gráfico coste vs valor
    const c2 = document.getElementById('rpt-ch-cv');
    if(c2 && m){
      _rptCharts.push(new Chart(c2, {
        type:'bar',
        data:{
          labels:['Coste','Valor actual'],
          datasets:[{
            data:[totalInvertido, valorActual],
            backgroundColor:[totalInvertido > valorActual ? 'rgba(224,36,36,.7)' : 'rgba(20,46,76,.5)', valorActual >= totalInvertido ? 'rgba(13,148,72,.7)' : 'rgba(224,36,36,.5)'],

          scales:{x:{beginAtZero:true,ticks:{font:{size:10},callback:v=>v.toLocaleString('es-ES')+'€'}},y:{ticks:{font:{size:12,weight:'bold'}}}}}
      }));
    }
  }, 150);
}


function valueToEur(amount, currency){ return roundMoney(toEur(Number(amount)||0, currency||'EUR')); }
function normalizeTickerSymbol(value){ return String(value||'').toUpperCase().replace(/[^A-Z0-9]/g,'').replace(/L$/,''); }
const TICKER_ALIASES = { ZEGL:'ZEG', ZEG:'ZEG', ZEGI:'ZEG', WKLDRRTS:'WKL.DRRTS' }; function aliasFor(ticker){ const raw=String(ticker||'').toUpperCase().replace(/[^A-Z0-9]/g,''); if(TICKER_ALIASES[raw]) return TICKER_ALIASES[raw]; const withoutL=raw.replace(/L$/,''); if(TICKER_ALIASES[withoutL]) return TICKER_ALIASES[withoutL]; const withoutI=raw.replace(/I$/,''); if(TICKER_ALIASES[withoutI]) return TICKER_ALIASES[withoutI]; return raw; }
function canonicalTicker(value){ return aliasFor(value); }
function findTickerMatch(symbol){
  const raw=String(symbol||'').toUpperCase().trim();
  const exact=D.c.find(e=>String(e.tk).toUpperCase()===raw);
  if(exact) return {type:'update', item:exact, reason:'exacto'};
  const canonical=canonicalTicker(raw);
  const byAlias=D.c.find(e=>String(e.tk).toUpperCase()===canonical);
  if(byAlias && canonical!==raw) return {type:'possible', item:byAlias, reason:`${byAlias.tk}≈${raw}`};
  const norm=normalizeTickerSymbol(raw);
  const fuzzy=D.c.find(e=>normalizeTickerSymbol(e.tk)===norm);
  if(fuzzy) return {type:'possible', item:fuzzy, reason:`${fuzzy.tk}≈${raw}`};
  return {type:'new', item:null, reason:'nuevo'};
}
function isIgnorableImportedPosition(pos){ return Number(pos.valor_mercado_origen||0)===0 || /DRRTS|RIGHTS|DERECH/i.test(pos.ticker||''); }
function buildIbkrReview(report){
  const positions=normalizeIbkrImportPositions(report);
  return {report, positions:positions.map((pos,idx)=>({id:`ibkr-${idx}`, pos, match:findTickerMatch(pos.ticker), include:!isIgnorableImportedPosition(pos)}))};
}
function renderIbkrReview(review){

    if(isIgnorableImportedPosition(p)) html+=`<label style="display:block;font-size:12px;margin-top:6px;color:var(--ink3)"><input type="checkbox" id="include-${row.id}"> incluir derecho/valor cero</label>`;

  status.innerHTML=html;
}
function cancelIbkrReview(){ window.pendingIbkrReview=null; document.getElementById('ibkr-status').innerHTML='<div style="padding:14px;text-align:center;color:var(--ink3);font-weight:700">Importación cancelada</div>'; }
function applyIbkrReview(){
  const review=window.pendingIbkrReview; if(!review) return;
  let updated=0, added=0, ignored=0;
  for(const row of review.positions){
    const p=row.pos; let include=row.include;
    const inc=document.getElementById(`include-${row.id}`); if(inc) include=inc.checked;
    if(!include){ ignored++; continue; }
    let target=row.match.item;
    if(row.match.type==='possible'){
      const same=document.querySelector(`input[name="match-${row.id}"]:checked`)?.value==='same';
      if(!same) target=null;
    }
    if(target){ applyImportedPosition(target,p); updated++; }
    else { D.c.push(newImportedPosition(p)); added++; }
  }
  save(); updC(); window.pendingIbkrReview=null; rConfig(); if(cur==='resumen') rResumen(); toast(`✅ ${updated} actualizadas · ${added} nuevas · ${ignored} ignoradas`);
}
function applyImportedPosition(item,pos){
  item.sourceCurrency=pos.divisa; item.valOriginal=pos.valor_mercado_origen; item.pnlOriginal=pos.pnl_origen;
  if(pos.num_acciones!=null) item.qty=pos.num_acciones;
  if(pos.valor_mercado_eur!=null) item.val=roundMoney(pos.valor_mercado_eur);
  if(pos.pnl_eur!=null) item.pnl=roundMoney(pos.pnl_eur);
  if(pos.precio_medio!=null) item.avg=pos.precio_medio;
  item.cur=pos.divisa||item.cur||'USD';
}
function newImportedPosition(pos){ return {tk:canonicalTicker(pos.ticker), nm:pos.nombre||canonicalTicker(pos.ticker), ex:pos.exchange||'—', cur:pos.divisa||'USD', sourceCurrency:pos.divisa||'USD', valOriginal:pos.valor_mercado_origen, pnlOriginal:pos.pnl_origen, sec:pos.sector||'—', qty:pos.num_acciones||0, avg:pos.precio_medio||0, pr:pos.precio_actual||0, cost:0, val:roundMoney(pos.valor_mercado_eur||0), pnl:roundMoney(pos.pnl_eur||0), w:0, divs:0, sig:null}; }

/* ════════════════════════════════════════════════
   SUBIR INFORME IBKR — Actualizar posiciones
   ════════════════════════════════════════════════ */
async function handleIbkrReport(event){
  const file = event.target.files[0];
  if(!file) return;

  const zone = document.getElementById('ibkr-upload-zone');
  const status = document.getElementById('ibkr-status');
  zone.classList.add('processing');
  status.innerHTML = '<div style="padding:14px;text-align:center;color:var(--acc);font-weight:700;font-size:14px">⏳ Analizando informe... puede tardar unos segundos</div>';

  try {
    const formData = new FormData();
    formData.append('file', file);
    const report = await backendFormFetch('/api/ibkr/import', formData);
    const review = buildIbkrReview(report);
    zone.classList.remove('processing');
    if(!review.positions.length){
      status.innerHTML = '<div style="padding:14px;text-align:center;color:var(--red);font-weight:700">⚠️ No se detectaron posiciones en el informe</div>';
      return;
    }
    renderIbkrReview(review);
  } catch(err){
    console.error('IBKR report error:', err);
    zone.classList.remove('processing');
    const msg = err.message || 'Error procesando informe';
    status.innerHTML = `<div style="padding:14px;text-align:center;color:var(--red);font-weight:700">❌ ${msg}</div>`;
    toast('❌ '+msg);
  }
  event.target.value = '';
}

function normalizeIbkrImportPositions(report){
  const positions = Array.isArray(report?.positions) ? report.positions : [];
  return positions.map((pos) => {
    const divisa = String(pos.currency || 'EUR').toUpperCase();
    const mvOrigin = Number(pos.marketValueOrigin || pos.marketValue || 0);
    const mvEur = Number(pos.marketValueEur || 0);
    const pnlOrigin = Number(pos.unrealizedPnLOrigin || pos.unrealizedPnL || 0);
    const pnlEur = Number(pos.unrealizedPnLEur || 0);
    return {
      ticker: pos.symbol,
      nombre: pos.symbol,
      divisa,
      num_acciones: pos.quantity,
      precio_medio: pos.avgPrice,
      precio_actual: null,
      coste_total_eur: null,
      valor_mercado_origen: mvOrigin,
      valor_mercado_eur: mvEur || valueToEur(mvOrigin, divisa),
      pnl_origen: pnlOrigin,
      pnl_eur: pnlEur || valueToEur(pnlOrigin, divisa),
      rentabilidad_pct: null,
      dividendos_netos_eur: null,
      comisiones_eur: report.fees,
      tipo_cambio: getFx(divisa),
      peso_pct: null,
      exchange: '—',
      sector: '—'
    };
  });
}

function exportData(){
  const portfolioSnapshot = livePortfolioSnapshot();
  const backup = {
    _version: 'analisis-loren-v1',
    _date: new Date().toISOString(),
    idc7: portfolioSnapshot,
    idc7_updatedAt: localStorage.getItem('idc7_updatedAt'),
    idc7_syncedAt: localStorage.getItem('idc7_syncedAt'),
    brokerTariffs: localStorage.getItem('brokerTariffs'),
    fxRates: JSON.stringify(FX_RATES),
    idc_valuation_config: localStorage.getItem('idc_valuation_config'),
    coveredCalls: loadCoveredCalls(),
  };
  // También exportar datos de valoración IDC por empresa
  for(let i=0; i<localStorage.length; i++){
    const k = localStorage.key(i);
    if(k.startsWith('idc_inputs_') || k.startsWith('val_data_')) backup[k] = localStorage.getItem(k);
  }
  const json = JSON.stringify(backup, null, 2);
  const blob = new Blob([json], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  const date = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())}-${pad(now.getHours())}${pad(now.getMinutes())}`;
  a.href = url;
  a.download = 'backup-'+date+'.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('✅ Información exportada');
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(e){
    try {
      const backup = JSON.parse(e.target.result);
      if(!backup._version){
        toast('❌ Archivo no válido');
        return;
      }
      if(!confirm('Esto reemplazará tu cartera actual y tus valoraciones guardadas por el contenido del fichero. ¿Continuar?')){
        event.target.value = '';
        return;
      }
      let count = 0;
      const knownKeys = ['idc7','idc7_updatedAt','idc7_syncedAt','brokerTariffs','fxRates','idc_valuation_config','coveredCalls'];
      knownKeys.forEach(k=>{
        const v = backup[k];
        if(v != null){
          localStorage.setItem(k, typeof v === 'string' ? v : JSON.stringify(v));
          count++;
        }
      });
      if(backup.idc7 != null && backup.idc7_updatedAt == null) localStorage.setItem('idc7_updatedAt', new Date().toISOString());
      for(const [k,v] of Object.entries(backup)){
        if(k.startsWith('_') || knownKeys.includes(k)) continue; // skip metadata and handled keys
        if(v != null && (k.startsWith('idc_inputs_') || k.startsWith('val_data_'))){
          localStorage.setItem(k, typeof v === 'string' ? v : JSON.stringify(v));
          count++;
        }
      }
      toast('✅ Información importada — recargando...');
      setTimeout(()=>location.reload(), 1500);
    } catch(err){
      toast('❌ Error leyendo archivo: '+err.message);
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

function renderInitialView(){
  updC();
  rResumen();
  refreshUnsavedBar();
  refreshFxRates().then(()=>{ if(cur==='resumen') rResumen(); });
}
async function bootApp(){
  loadFxRates();
  if(!hasPersistenceToken()){
    load();
    renderInitialView();
    return;
  }
  const hasLocalIdc7 = !!localStorage.getItem('idc7');
  const hasUnsaved = hasLocalUnsavedChanges();
  try {
    const data = await backendFetch('/api/persistence/snapshot', { headers: persistenceHeaders() });
    const snapshot = data.snapshot || {};
    const serverHasPortfolio = countPortfolioPositionsFromIdc7(snapshot.idc7) > 0;
    if(serverHasPortfolio && (!hasLocalIdc7 || !hasUnsaved)){
      applySnapshotToLocal(snapshot, {markSynced:true});
      loadFxRates();
      load();
      renderInitialView();
      return;
    }
    load();
    renderInitialView();
    if(serverHasPortfolio && hasUnsaved) showSyncConflict(snapshot);
  } catch(e){
    load();
    renderInitialView();
    toast('No se pudo contactar con el servidor');
  }
}
bootApp();
</script>
