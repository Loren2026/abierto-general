version: "3.9"

services:
  backend:
    container_name: analisis-mercado-backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    env_file:
      - ./.env
    restart: unless-stopped
    expose:
      - "3001"
    networks:
      - analisis-internal

  nginx:
    container_name: analisis-mercado-nginx
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - analisis-internal
      - openclaw-2ns9_default
    labels:
      - traefik.enable=true
      - traefik.http.routers.analisis-mercado.rule=Host(`analisis.inteligencialoren.com`)
      - traefik.http.routers.analisis-mercado.entrypoints=websecure
      - traefik.http.routers.analisis-mercado.tls=true
      - traefik.http.routers.analisis-mercado.tls.certresolver=letsencrypt
      - traefik.http.routers.analisis-mercado.priority=50
      - traefik.http.services.analisis-mercado.loadbalancer.server.port=80

networks:
  analisis-internal:
    driver: bridge
  openclaw-2ns9_default:
    external: true
