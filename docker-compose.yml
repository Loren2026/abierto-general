version: "3.9"

services:
  inteligencialoren-web:
    container_name: inteligencialoren-web
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - openclaw-2ns9_default
    labels:
      - traefik.enable=true
      - traefik.http.routers.inteligencialoren-web.rule=Host(`inteligencialoren.com`) || Host(`www.inteligencialoren.com`) || Host(`panel.inteligencialoren.com`)
      - traefik.http.routers.inteligencialoren-web.entrypoints=websecure
      - traefik.http.routers.inteligencialoren-web.tls=true
      - traefik.http.routers.inteligencialoren-web.tls.certresolver=letsencrypt
      - traefik.http.routers.inteligencialoren-web.priority=10
      - traefik.http.services.inteligencialoren-web.loadbalancer.server.port=80

  inteligencialoren-api:
    container_name: inteligencialoren-api
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./api/.env
    restart: unless-stopped
    networks:
      - openclaw-2ns9_default
    labels:
      - traefik.enable=true
      - traefik.http.routers.inteligencialoren-api.rule=Host(`panel.inteligencialoren.com`) && PathPrefix(`/api`)
      - traefik.http.routers.inteligencialoren-api.entrypoints=websecure
      - traefik.http.routers.inteligencialoren-api.tls=true
      - traefik.http.routers.inteligencialoren-api.tls.certresolver=letsencrypt
      - traefik.http.routers.inteligencialoren-api.priority=100
      - traefik.http.services.inteligencialoren-api.loadbalancer.server.port=3000
      - traefik.http.routers.inteligencialoren-api-public.rule=Host(`inteligencialoren.com`) && PathPrefix(`/api`)
      - traefik.http.routers.inteligencialoren-api-public.entrypoints=websecure
      - traefik.http.routers.inteligencialoren-api-public.tls=true
      - traefik.http.routers.inteligencialoren-api-public.tls.certresolver=letsencrypt
      - traefik.http.routers.inteligencialoren-api-public.priority=100
      - traefik.http.routers.inteligencialoren-api-public.service=inteligencialoren-api
      - traefik.http.middlewares.il-cors.headers.accesscontrolalloworiginlistregex=^https://(www\.|panel\.|restricciones\.)?inteligencialoren\.com
      - traefik.http.middlewares.il-cors.headers.accesscontrolallowmethods=GET,HEAD,PUT,PATCH,POST,DELETE,OPTIONS
      - traefik.http.middlewares.il-cors.headers.accesscontrolallowheaders=content-type,authorization,x-csrf-token
      - traefik.http.middlewares.il-cors.headers.accesscontrolallowcredentials=true
      - traefik.http.middlewares.il-cors.headers.accesscontrolmaxage=86400
      - traefik.http.middlewares.il-cors.headers.addvaryheader=true
      - traefik.http.routers.inteligencialoren-api.middlewares=il-cors
      - traefik.http.routers.inteligencialoren-api-public.middlewares=il-cors

  openclaw-workspace-bridge:
    container_name: openclaw-workspace-bridge
    build:
      context: ./openclaw-workspace-bridge
      dockerfile: Dockerfile
    env_file:
      - ./openclaw-workspace-bridge/.env
    restart: unless-stopped
    network_mode: "container:openclaw-2ns9-openclaw-1"


  restricciones-trafico:
    container_name: restricciones-trafico
    environment:
      ORS_API_KEY: ${ORS_API_KEY}
      ORS_BASE_URL: ${ORS_BASE_URL:-https://api.openrouteservice.org}
      ROUTING_PROVIDER: ${ROUTING_PROVIDER:-ors}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    build:
      context: ./restricciones-trafico
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - openclaw-2ns9_default
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health', timeout=5).read()\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    labels:
      - traefik.enable=true
      - traefik.http.routers.restricciones-trafico.rule=Host(`restricciones.inteligencialoren.com`)
      - traefik.http.routers.restricciones-trafico.entrypoints=websecure
      - traefik.http.routers.restricciones-trafico.tls=true
      - traefik.http.routers.restricciones-trafico.tls.certresolver=letsencrypt
      - traefik.http.routers.restricciones-trafico.priority=50
      - traefik.http.services.restricciones-trafico.loadbalancer.server.port=8090

networks:
  openclaw-2ns9_default:
    external: true
