version: "3.9"

services:
  inteligencialoren-web:
    container_name: inteligencialoren-web
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - openclaw-2ns9_default
    labels:
      - traefik.enable=true
      - traefik.http.routers.inteligencialoren-web.rule=Host(`inteligencialoren.com`) || Host(`www.inteligencialoren.com`) || Host(`panel.inteligencialoren.com`)
      - traefik.http.routers.inteligencialoren-web.entrypoints=websecure
      - traefik.http.routers.inteligencialoren-web.tls=true
      - traefik.http.routers.inteligencialoren-web.tls.certresolver=letsencrypt
      - traefik.http.routers.inteligencialoren-web.priority=10
      - traefik.http.services.inteligencialoren-web.loadbalancer.server.port=80

  inteligencialoren-api:
    container_name: inteligencialoren-api
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./api/.env
    restart: unless-stopped
    networks:
      - openclaw-2ns9_default
    labels:
      - traefik.enable=true
      - traefik.http.routers.inteligencialoren-api.rule=Host(`panel.inteligencialoren.com`) && PathPrefix(`/api`)
      - traefik.http.routers.inteligencialoren-api.entrypoints=websecure
      - traefik.http.routers.inteligencialoren-api.tls=true
      - traefik.http.routers.inteligencialoren-api.tls.certresolver=letsencrypt
      - traefik.http.routers.inteligencialoren-api.priority=100
      - traefik.http.services.inteligencialoren-api.loadbalancer.server.port=3000
      - traefik.http.routers.inteligencialoren-api-public.rule=Host(`inteligencialoren.com`) && PathPrefix(`/api`)
      - traefik.http.routers.inteligencialoren-api-public.entrypoints=websecure
      - traefik.http.routers.inteligencialoren-api-public.tls=true
      - traefik.http.routers.inteligencialoren-api-public.tls.certresolver=letsencrypt
      - traefik.http.routers.inteligencialoren-api-public.priority=100
      - traefik.http.routers.inteligencialoren-api-public.service=inteligencialoren-api

networks:
  openclaw-2ns9_default:
    external: true
